<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Booking Success</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --green-50:   #f0fdf4;
      --green-100:  #dcfce7;
      --green-200:  #bbf7d0;
      --green-300:  #86efac;
      --green-500:  #22c55e;
      --green-600:  #16a34a;
      --green-700:  #15803d;
      --green-900:  #14532d;
      --emerald-50: #ecfdf5;
      --emerald-100:#d1fae5;
      --purple-100: #ede9fe;
      --purple-700: #6d28d9;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-300:   #d1d5db;
      --gray-500:   #6b7280;
      --gray-600:   #4b5563;
      --gray-700:   #374151;
      --gray-900:   #111827;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .page-wrap {
      max-width: 680px;
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Success Header ── */
    .success-header {
      text-align: center;
      animation: fadeDown .6s ease both;
    }
    .check-circle {
      width: 84px; height: 84px;
      background: linear-gradient(135deg, var(--green-500), #10b981);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      box-shadow: 0 0 0 0 rgba(34,197,94,.4);
      animation: pulse 2s ease infinite;
    }
    .check-circle svg { width: 46px; height: 46px; stroke: #fff; }
    @keyframes pulse {
      0%,100% { box-shadow: 0 0 0 0 rgba(34,197,94,.4); }
      50%      { box-shadow: 0 0 0 18px rgba(34,197,94,0); }
    }
    @keyframes fadeDown {
      from { opacity:0; transform:translateY(-20px); }
      to   { opacity:1; transform:translateY(0); }
    }
    .success-title {
      font-family: 'Playfair Display', serif;
      font-size: 32px;
      color: #fff;
      margin-bottom: 8px;
    }
    .success-sub { color: rgba(255,255,255,.75); font-size: 16px; }

    /* ── Main Card ── */
    .card {
      background: linear-gradient(135deg, var(--green-50), var(--emerald-50));
      border: 2px solid var(--green-200);
      border-radius: 18px;
      padding: 32px;
      box-shadow: 0 20px 60px rgba(0,0,0,.25);
      animation: fadeUp .65s ease both;
    }
    @keyframes fadeUp {
      from { opacity:0; transform:translateY(20px); }
      to   { opacity:1; transform:translateY(0); }
    }

    .card-title {
      font-size: 18px;
      font-weight: 600;
      color: var(--green-900);
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 24px;
    }
    .card-title svg { width: 22px; height: 22px; stroke: var(--green-600); }

    /* ── Grid 2 ── */
    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      margin-bottom: 16px;
    }
    @media (max-width:500px) { .grid-2 { grid-template-columns: 1fr; } }

    .info-box {
      background: #fff;
      border-radius: 12px;
      padding: 16px;
    }
    .info-label {
      font-size: 12px;
      color: var(--gray-500);
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 8px;
    }
    .info-label svg { width: 14px; height: 14px; }
    .info-value {
      font-size: 15px;
      font-weight: 500;
      color: var(--gray-900);
    }

    /* ── Cat Tags ── */
    .cat-tags { display: flex; flex-wrap: wrap; gap: 8px; }
    .cat-tag {
      padding: 6px 16px;
      background: var(--purple-100);
      color: var(--purple-700);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
    }

    /* ── Services List ── */
    .service-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 0;
      border-bottom: 1px solid var(--gray-100);
    }
    .service-row:last-child { border-bottom: none; }
    .service-left { display: flex; align-items: center; gap: 12px; }
    .service-num {
      width: 34px; height: 34px;
      background: var(--purple-100);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 13px;
      font-weight: 600;
      color: var(--purple-700);
      flex-shrink: 0;
    }
    .service-name { font-size: 14px; font-weight: 500; color: var(--gray-900); }
    .service-dur  { font-size: 12px; color: var(--gray-500); margin-top: 2px; }
    .service-price{ font-size: 14px; font-weight: 600; color: var(--gray-700); }

    /* ── Total ── */
    .total-box {
      margin-top: 16px;
      padding: 16px;
      background: linear-gradient(135deg, var(--green-100), var(--emerald-100));
      border: 2px solid var(--green-300);
      border-radius: 12px;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .total-label { font-size: 16px; font-weight: 600; color: var(--green-900); }
    .total-amount { font-size: 26px; font-weight: 700; color: var(--green-700); }

    /* ── Close Button ── */
    .btn-close-wrap { display: flex; justify-content: center; animation: fadeUp .7s .1s ease both; }
    .btn-close {
      padding: 13px 40px;
      background: rgba(255,255,255,.15);
      color: #fff;
      border: 2px solid rgba(255,255,255,.3);
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      display: flex; align-items: center; gap: 8px;
      backdrop-filter: blur(4px);
      transition: background .2s, border-color .2s;
    }
    .btn-close:hover { background: rgba(255,255,255,.25); border-color: rgba(255,255,255,.5); }
    .btn-close svg { width: 16px; height: 16px; }
  </style>
</head>
<body>

<div class="page-wrap">

  <!-- Success Header -->
  <div class="success-header">
    <div class="check-circle">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <polyline points="20 6 9 17 4 12"/>
      </svg>
    </div>
    <h1 class="success-title">Booking Successful!</h1>
    <p class="success-sub">Your grooming appointment has been confirmed</p>
  </div>

  <!-- Appointment Details Card -->
  <div class="card">
    <div class="card-title">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
      Appointment Details
    </div>

    <!-- Date & Time -->
    <div class="grid-2">
      <div class="info-box">
        <div class="info-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
          Date
        </div>
        <div class="info-value" id="apptDate"></div>
      </div>
      <div class="info-box">
        <div class="info-label">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
          Time
        </div>
        <div class="info-value" id="apptTime"></div>
      </div>
    </div>

    <!-- Cat Names -->
    <div class="info-box" style="margin-bottom:14px">
      <div class="info-label">🐱 Cat(s)</div>
      <div class="cat-tags" id="catTags"></div>
    </div>

    <!-- Services -->
    <div class="info-box">
      <div class="info-label">
        ✂️ Services
      </div>
      <div id="servicesList"></div>
    </div>

    <!-- Total -->
    <div class="total-box">
      <span class="total-label">Total Amount</span>
      <span class="total-amount" id="totalAmount"></span>
    </div>
  </div>

  <!-- Close Button -->
  <div class="btn-close-wrap">
    <button class="btn-close" onclick="window.location.href='customerAppointment.html'">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      Close
    </button>
  </div>

</div>

<script>
  // ── Sample Data ──────────────────────────────────────────────────────────
  const booking = {
    date: '2026-05-20',
    time: '10:00 AM',
    cats: [
      { id: '1', name: 'Whiskers' },
    ],
    services: [
      { id: 's1', name: 'Short-hair Package', description: 'Bath & dry, nail clipping, eye & ear cleaning. Great for short-haired cats.', price: 55.00, icon: '✂️' },
      { id: 's2', name: 'Flea Removal', description: 'Topical flea and tick treatment applied during the bath.', price: 15.00, icon: '👂' },
      { id: 's3', name: 'Medicated Shampoo + Scrubbing', description: 'Hypoallergenic or medicated shampoo for sensitive or problem skin.', price: 20.00, icon: '🛁' }
    ]
  };

  // ── Render ───────────────────────────────────────────────────────────────
  function render() {
    // Date
    document.getElementById('apptDate').textContent =
      new Date(booking.date + 'T00:00:00').toLocaleDateString('en-US', {
        weekday: 'long', year: 'numeric', month: 'long', day: 'numeric'
      });

    // Time
    document.getElementById('apptTime').textContent = booking.time;

    // Cats
    const tagsEl = document.getElementById('catTags');
    booking.cats.forEach(cat => {
      const span = document.createElement('span');
      span.className = 'cat-tag';
      span.textContent = cat.name;
      tagsEl.appendChild(span);
    });

    // Services
    const listEl = document.getElementById('servicesList');
    let total = 0;
    booking.services.forEach((svc, i) => {
      total += svc.price;
      const row = document.createElement('div');
      row.className = 'service-row';
      row.innerHTML = `
        <div class="service-left">
          <div class="service-num">${i + 1}</div>
          <div>
            <div class="service-name">${svc.name}</div>
            <div class="service-dur">${svc.duration}</div>
          </div>
        </div>
        <div class="service-price">RM ${svc.price.toFixed(2)}</div>
      `;
      listEl.appendChild(row);
    });

    document.getElementById('totalAmount').textContent = `RM ${total.toFixed(2)}`;
  }

  render();
</script>
</body>
</html>
