<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowy Groom - Edit Cat</title>
    <style>
        :root {
            --purple-dark: #4c1d95; /* purple-900 */
            --purple-light: #f5f3ff;
            --pink-light: #fdf2f8;
            --border-color: #fce7f3;
            --text-gray: #4b5563;
            --error-red: #ef4444;
            --success-green: #22c55e;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f9fafb;
            display: flex;
        }

        .logout {
            border-top: 1px solid #e5e7eb;
            padding: 16px;
            color: var(--error-red);
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
        }

        /* --- Main Content --- */
        main {
            margin-top: 64px;
            padding: 40px;
            width: 100%;
            max-width: 1000px;
        }

        .page-title {
            font-size: 1.8rem;
            color: #111827;
            margin-bottom: 4px;
        }

        .page-subtitle {
            color: var(--text-gray);
            margin-bottom: 24px;
        }

        .back-button {
            color: #9333ea;
            display: flex;
            align-items: center;
            gap: 8px;
            text-decoration: none;
            margin-bottom: 24px;
            font-weight: 500;
        }

        /* --- Form Container --- */
        .form-card {
            background: white;
            border-radius: 16px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 32px;
        }

        .form-header {
            display: flex;
            align-items: center;
            gap: 16px;
            padding-bottom: 24px;
            border-bottom: 1px solid #f3f4f6;
            margin-bottom: 32px;
        }

        .cat-avatar {
            width: 64px;
            height: 64px;
            background: linear-gradient(to bottom right, #f3e8ff, #fce7f3);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
        }

        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 24px;
        }

        .full-width {
            grid-column: span 2;
        }

        label {
            display: block;
            font-size: 0.875rem;
            margin-bottom: 8px;
            color: var(--text-gray);
        }

        label span {
            color: var(--error-red);
        }

        input, select, textarea {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 1rem;
            outline: none;
        }

        input:focus, select:focus, textarea:focus {
            border-color: #a855f7;
            box-shadow: 0 0 0 2px rgba(168, 85, 247, 0.2);
        }

        .owner-read-only {
            background-color: #f3f4f6;
            padding: 16px;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            color: var(--text-gray);
        }

        /* --- Buttons --- */
        .button-group {
            display: flex;
            gap: 16px;
            margin-top: 32px;
            padding-top: 24px;
            border-top: 1px solid #f3f4f6;
        }

        .btn {
            flex: 1;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            color: white;
            text-align: center;
        }

        .btn-save {
            background-color: var(--success-green);
        }

        .btn-cancel {
            background-color: var(--error-red);
        }
    </style>
</head>
<body>

    <main>
        <div class="form-card">
            <div class="form-header">
                <div class="cat-avatar">🐱</div>
                <div>
                    <h2 style="font-size: 1.5rem; color: #111827;">Edit Cat Information</h2>
                    <p style="color: var(--text-gray);">Update Whiskers's profile</p>
                </div>
            </div>

            <form>
                <div class="form-grid">
                    <div class="full-width">
                        <label>Cat Name <span>*</span></label>
                        <input type="text" value="Whiskers">
                    </div>

                    <div>
                        <label>Breed <span>*</span></label>
                        <select>
                            <option>Persian</option>
                            <option>Siamese</option>
                            <option>Maine Coon</option>
                        </select>
                    </div>

                    <div>
                        <label>Gender <span>*</span></label>
                        <select>
                            <option>Male</option>
                            <option>Female</option>
                        </select>
                    </div>

                    <div>
                        <label>Age (years) <span>*</span></label>
                        <input type="number" value="3">
                    </div>

                    <div>
                        <label>Weight (kg) <span>*</span></label>
                        <input type="number" step="0.1" value="4.5">
                    </div>

                    <div class="full-width">
                        <label>Special Notes</label>
                        <textarea rows="4">Sensitive skin, use hypoallergenic shampoo</textarea>
                    </div>

                    <div class="full-width">
                        <label>Owner</label>
                        <div class="owner-read-only">
                            <span>Ali Ahmad</span>
                            <span style="font-size: 0.8rem; color: #9ca3af;">(Cannot be changed)</span>
                        </div>
                    </div>
                </div>

                <div class="button-group">
                    <button type="button" class="btn btn-save" onclick="window.location.href='customerCat.html'">Save</button>
                    <button type="button" class="btn btn-cancel" onclick="window.location.href='customerCat.html'">Cancel</button>
                </div>
            </form>
        </div>
    </main>

</body>
</html>
