<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Invoices</title>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/customerInvoice.css" />
</head>
<body>

<div class="page">

  <!-- Stats -->
  <div class="stats">
    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon purple">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        </div>
        <span class="stat-value purple" id="stat-total">0</span>
      </div>
      <div class="stat-label">Total Invoices</div>
    </div>

    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <span class="stat-value green" id="stat-paid">RM 0.00</span>
      </div>
      <div class="stat-label">Total Paid</div>
    </div>

    <div class="stat-card">
      <div class="stat-top">
        <div class="stat-icon yellow">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>
        </div>
        <span class="stat-value yellow" id="stat-unpaid">RM 0.00</span>
      </div>
      <div class="stat-label">Unpaid</div>
    </div>
  </div>

  <!-- Header + Filter -->
  <div class="header-card">
    <h2>My Invoices</h2>
    <p>View and download your payment history</p>
    <div class="filter-row">
      <button class="filter-btn active-all" data-filter="all">All</button>
      <button class="filter-btn" data-filter="paid">Paid</button>
      <button class="filter-btn" data-filter="unpaid">Unpaid</button>
    </div>
  </div>

  <!-- Invoice List -->
  <div class="invoice-list" id="invoice-list"></div>

</div>

<!-- Modal -->
<div class="overlay" id="overlay">
  <div class="modal" id="modal">
    <div class="modal-head">
      <h2>Invoice Details</h2>
      <button class="close-btn" id="close-modal-btn">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>
    <div class="modal-body" id="modal-body"></div>
  </div>
</div>

<script>
// ─── Data ────────────────────────────────────────────────────────────────────

const allInvoices = {
  ali: [
    {
      id: '1', invoiceNumber: 'INV-2024-001', catName: 'Whiskers', date: '2026-01-08',
      items: [
        { description: 'Full Grooming Package', price: 80 },
        { description: 'Nail Trimming', price: 15 },
        { description: 'Ear Cleaning', price: 10 }
      ],
      subtotal: 105, total: 105, status: 'paid', createdAt: '2026-01-08'
    },
    {
      id: '3', invoiceNumber: 'INV-2024-003', catName: 'Mittens', date: '2026-01-15',
      items: [
        { description: 'Premium Grooming Package', price: 120 },
        { description: 'Teeth Cleaning', price: 30 },
        { description: 'Special Shampoo Treatment', price: 20 }
      ],
      subtotal: 170, total: 170, status: 'unpaid', createdAt: '2026-01-15'
    }
  ],
  sarah: [
    {
      id: '2', invoiceNumber: 'INV-2024-002', catName: 'Shadow', date: '2024-01-15',
      items: [
        { description: 'Basic Bath & Brush', price: 50 },
        { description: 'Flea Treatment', price: 25 }
      ],
      subtotal: 75, total: 75, status: 'unpaid', createdAt: '2024-01-15'
    }
  ],
  john: [
    {
      id: '4', invoiceNumber: 'INV-2024-004', catName: 'Bella', date: '2024-02-20',
      items: [
        { description: 'Full Grooming Package', price: 80 },
        { description: 'De-matting Service', price: 35 }
      ],
      subtotal: 115, total: 115, status: 'paid', createdAt: '2024-02-20'
    }
  ],
  wawa2: [
    {
      id: '5', invoiceNumber: 'INV-2024-005', catName: 'Fluffy', date: '2026-01-18',
      items: [
        { description: 'Full Grooming Package', price: 80 },
        { description: 'Nail Trimming', price: 15 }
      ],
      subtotal: 95, total: 95, status: 'paid', createdAt: '2026-01-18'
    },
    {
      id: '6', invoiceNumber: 'INV-2024-006', catName: 'Snowy', date: '2026-01-19',
      items: [
        { description: 'Premium Grooming Package', price: 120 },
        { description: 'Teeth Cleaning', price: 30 }
      ],
      subtotal: 150, total: 150, status: 'unpaid', createdAt: '2026-01-19'
    }
  ]
};

// ─── State ───────────────────────────────────────────────────────────────────

let currentUser   = 'ali';
let currentFilter = 'all';

// ─── Helpers ─────────────────────────────────────────────────────────────────

const fmt  = n => `RM ${n.toFixed(2)}`;
const date = s => new Date(s).toLocaleDateString('en-US', { year:'numeric', month:'short', day:'numeric' });

function getUserInvoices() { return allInvoices[currentUser] || []; }

function getFiltered() {
  const inv = getUserInvoices();
  return currentFilter === 'all' ? inv : inv.filter(i => i.status === currentFilter);
}

// ─── Render stats ─────────────────────────────────────────────────────────────

function renderStats() {
  const inv = getUserInvoices();
  const paid   = inv.filter(i => i.status === 'paid').reduce((s,i) => s + i.total, 0);
  const unpaid = inv.filter(i => i.status !== 'paid').reduce((s,i) => s + i.total, 0);
  document.getElementById('stat-total').textContent  = inv.length;
  document.getElementById('stat-paid').textContent   = fmt(paid);
  document.getElementById('stat-unpaid').textContent = fmt(unpaid);
}

// ─── Render list ──────────────────────────────────────────────────────────────

const ICONS = {
  file: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/></svg>`,
  cat:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a9 9 0 0 1 9 9c0 4.97-4.03 9-9 9S3 15.97 3 11a9 9 0 0 1 9-9z"/><path d="M8 2 6 6M16 2l2 4"/><circle cx="9" cy="12" r="1"/><circle cx="15" cy="12" r="1"/><path d="M9 16s1 1 3 1 3-1 3-1"/></svg>`,
  cal:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>`,
  dollar:`<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`,
  eye:  `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>`,
  dl:   `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>`,
  x:    `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>`
};

function renderList() {
  const list = document.getElementById('invoice-list');
  const filtered = getFiltered();
  list.innerHTML = '';

  if (filtered.length === 0) {
    list.innerHTML = `
      <div class="empty">
        ${ICONS.file}
        <h3>No Invoices Found</h3>
        <p>${currentFilter !== 'all' ? `You don't have any ${currentFilter} invoices` : 'No invoices available yet'}</p>
      </div>`;
    return;
  }

  filtered.forEach((inv, i) => {
    const card = document.createElement('div');
    card.className = 'invoice-card';
    card.style.animationDelay = `${i * 0.06}s`;

    card.innerHTML = `
      <div class="inv-top">
        <div class="inv-left">
          <div class="inv-icon">${ICONS.file}</div>
          <div>
            <div class="inv-num">${inv.invoiceNumber}</div>
            <div class="inv-issued">Issued on ${date(inv.createdAt)}</div>
          </div>
        </div>
        <div class="inv-actions">
          <button class="act-btn view" data-id="${inv.id}">${ICONS.eye} View</button>
          <button class="act-btn pdf">${ICONS.dl} PDF</button>
        </div>
      </div>

      <div class="inv-meta">
        <div>
          <div class="meta-label">${ICONS.cat} Cat</div>
          <div class="meta-val">${inv.catName}</div>
        </div>
        <div>
          <div class="meta-label">${ICONS.cal} Service Date</div>
          <div class="meta-val">${date(inv.date)}</div>
        </div>
        <div>
          <div class="meta-label">${ICONS.dollar} Amount</div>
          <div class="meta-val large">${fmt(inv.total)}</div>
        </div>
      </div>

      <div class="inv-footer">
        <span class="badge ${inv.status}">${inv.status.charAt(0).toUpperCase() + inv.status.slice(1)}</span>
        <span class="svc-count">${inv.items.length} ${inv.items.length === 1 ? 'service' : 'services'}</span>
      </div>`;

    // View button
    card.querySelector('.act-btn.view').addEventListener('click', () => openModal(inv));
    list.appendChild(card);
  });
}

function render() { renderStats(); renderList(); }

// ─── Modal ────────────────────────────────────────────────────────────────────

function openModal(inv) {
  document.getElementById('modal-body').innerHTML = `
    <div class="modal-inv-num">${inv.invoiceNumber}</div>
    <div style="margin-bottom:16px">
      <span class="badge ${inv.status}">${inv.status.toUpperCase()}</span>
    </div>

    <div class="modal-meta-grid">
      <div class="modal-meta-cell">
        <div class="lbl">Service Date</div>
        <div class="val">${date(inv.date)}</div>
      </div>
      <div class="modal-meta-cell">
        <div class="lbl">Cat</div>
        <div class="val">${inv.catName}</div>
      </div>
    </div>

    <div class="modal-section-title">Services Provided</div>
    <table>
      <thead>
        <tr>
          <th>Description</th>
          <th>Amount</th>
        </tr>
      </thead>
      <tbody>
        ${inv.items.map(item => `
          <tr>
            <td>${item.description}</td>
            <td>${fmt(item.price)}</td>
          </tr>`).join('')}
      </tbody>
    </table>

    <div class="totals-box">
      <div class="total-row">
        <span>Subtotal:</span>
        <span>${fmt(inv.subtotal)}</span>
      </div>
      <div class="total-row grand">
        <span>Total:</span>
        <span>${fmt(inv.total)}</span>
      </div>
    </div>

    <div class="modal-actions">
      <button class="modal-btn download" onclick="window.print()">${ICONS.dl} Download PDF</button>
      <button class="modal-btn close-modal" id="modal-close-inner">${ICONS.x} Close</button>
    </div>`;

  document.getElementById('modal-close-inner').addEventListener('click', closeModal);
  document.getElementById('overlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closeModal() {
  document.getElementById('overlay').classList.remove('open');
  document.body.style.overflow = '';
}

document.getElementById('close-modal-btn').addEventListener('click', closeModal);
document.getElementById('overlay').addEventListener('click', e => {
  if (e.target === document.getElementById('overlay')) closeModal();
});

// ─── Filters ──────────────────────────────────────────────────────────────────

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    currentFilter = btn.dataset.filter;
    document.querySelectorAll('.filter-btn').forEach(b => b.className = 'filter-btn');
    btn.classList.add(`active-${currentFilter}`);
    renderList();
  });
});

// ─── Init ─────────────────────────────────────────────────────────────────────

render();
</script>
</body>
</html>
