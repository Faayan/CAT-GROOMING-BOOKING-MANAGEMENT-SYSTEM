<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My Receipts</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    :root { --font-size: 16px; }
    *, *::before, *::after { box-sizing: border-box; }
    html { font-size: var(--font-size); }
    body {
      margin: 0;
      background: #f3f4f6;
      color: #0f172a;
      -webkit-font-smoothing: antialiased;
      font-family: ui-sans-serif, system-ui, sans-serif;
    }
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.5);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 50;
    }
    .modal-box {
      background: #fff;
      border-radius: 1rem;
      box-shadow: 0 25px 50px rgba(0,0,0,0.25);
      width: 100%; max-width: 780px;
      max-height: 90vh; overflow-y: auto;
    }
    .badge-banking { background:#dbeafe; color:#1d4ed8; }
    .badge-ewallet  { background:#ede9fe; color:#7c3aed; }
    .badge-invoice  { background:#ede9fe; color:#7c3aed; }
    @media print { .no-print { display:none !important; } body { background:#fff; } }
  </style>
</head>

<body class="min-h-screen p-6">
<div class="max-w-5xl mx-auto">

  <!-- SECTION 1 · PAGE TITLE-->
  <div class="mb-6">
    <h1 class="text-2xl font-bold text-gray-900">My Receipts</h1>
  </div>

  <!--SECTION 2 · RECEIPT MANAGEMENT HEADER -->
  <div class="bg-white rounded-xl shadow-lg p-6 mb-6">
    <div class="mb-4">
      <h2 class="text-xl font-bold text-gray-900">Receipt Management</h2>
    </div>
    <div class="flex gap-3">
      <!-- Search bar -->
      <div class="relative flex-1">
        <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-5 h-5 text-gray-400"
             fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
        </svg>
        <input type="text" id="search-input"
          placeholder="Search by receipt number, customer, or invoice..."
          oninput="renderList()"
          class="w-full pl-11 pr-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm" />
      </div>
      <!-- Dropdown filter -->
      <select id="method-filter" onchange="renderList()"
        class="px-4 py-3 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-green-500 focus:border-transparent text-sm text-gray-700">
        <option value="all">All Methods</option>
        <option value="online_banking">Online Banking</option>
        <option value="ewallet">E-Wallet</option>
      </select>
    </div>
  </div>

  <!-- SECTION 3 · RECEIPT LIST-->
  <div class="space-y-4" id="receipt-list"></div>

</div>


<!-- SECTION 4 · RECEIPT DETAIL MODAL-->
<div class="modal-backdrop" id="modal" style="display:none;">
  <div class="modal-box">

    <!-- Modal sticky header -->
    <div class="sticky top-0 bg-white border-b border-gray-200 px-6 py-4 flex items-center justify-between no-print" style="z-index:10;">
      <div>
        <h2 class="text-xl font-bold text-gray-900">My Receipts</h2>
        <button onclick="closeModal()"
          class="flex items-center gap-1 text-green-600 hover:text-green-700 text-sm mt-1 font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 19l-7-7m0 0l7-7m-7 7h18"/>
          </svg>
          Back
        </button>
      </div>
      <div class="flex gap-2">
        <button onclick="window.print()"
          class="flex items-center gap-2 px-4 py-2 bg-gray-100 text-gray-700 rounded-lg hover:bg-gray-200 transition-all text-sm font-medium border border-gray-300">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z"/>
          </svg>
          Print
        </button>
        <button onclick="window.print()"
          class="flex items-center gap-2 px-4 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition-all text-sm font-medium">
          <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
          </svg>
          Download PDF
        </button>
      </div>
    </div>

    <!-- Modal body -->
    <div class="p-6 md:p-8" id="modal-body"></div>
  </div>
</div>
<!-- END SECTION 4 -->


<!--JAVASCRIPT-->
<script>
  const receipts = [
    {
      id: '1',
      receiptNumber: 'RCP-2024-001',
      confirmationNumber: 'CONF-2024-001-XY7Z9A',
      invoiceNumber: 'INV-2024-001',
      paymentDate: '2026-01-08',
      paymentMethod: 'online_banking',
      customerName: 'Ali Ahmad',
      customerEmail: 'aliahmad@gmail.com',
      customerId: '1',
      items: [
        { description: 'Adult Short Hair', amount: 90.00 },
        { description: 'Trimming - Paw & Sanitary Area', amount: 15.00 },
      ],
      subtotal: 105.00,
      total: 105.00,
      createdBy: 'Mike Johnson',
    },
    {
      id: '2',
      receiptNumber: 'RCP-2024-002',
      confirmationNumber: 'CONF-2024-004-AB3CD8',
      invoiceNumber: 'INV-2024-004',
      paymentDate: '2024-02-20',
      paymentMethod: 'ewallet',
      customerName: 'Ali Ahmad',
      customerEmail: 'aliahmad@gmail.com',
      customerId: '3',
      items: [
        { description: 'Adult Long Hair', amount: 100.00 },
        { description: 'Medicated Shampoo',             amount:  10.00 },
      ],
      subtotal: 110.00,
      total: 110.00,
      createdBy: 'Emma Wilson',
    },
    {
      id: '3',
      receiptNumber: 'RCP-2024-003',
      confirmationNumber: 'CONF-2024-007-MN9PQ2',
      invoiceNumber: 'INV-2024-007',
      paymentDate: '2025-12-10',
      paymentMethod: 'online_banking',
      customerName: 'Ali Ahmad',
      customerEmail: 'aliahmad@gmail.com',
      customerId: '2',
      items: [
        { description: 'Adult Long Hair', amount: 140.00 },
        { description: 'Adult Short Hair ',      amount: 115.00 },
      ],
      subtotal: 255.00,
      total: 255.00,
      createdBy: 'Mike Johnson',
    },
  ];

  function methodLabel(m) {
    return m === 'online_banking' ? 'Online Banking' : 'E-Wallet';
  }
  function methodBadgeClass(m) {
    return m === 'online_banking' ? 'badge-banking' : 'badge-ewallet';
  }
  function fmtDate(d) {
    return new Date(d).toLocaleDateString();
  }

  // Receipt list 
  function renderList() {
    const search = document.getElementById('search-input').value.toLowerCase();
    const method = document.getElementById('method-filter').value;
    const list   = document.getElementById('receipt-list');

    const filtered = receipts.filter(r => {
      const matchSearch =
        r.receiptNumber.toLowerCase().includes(search) ||
        r.customerName.toLowerCase().includes(search) ||
        (r.invoiceNumber && r.invoiceNumber.toLowerCase().includes(search));
      const matchMethod = method === 'all' || r.paymentMethod === method;
      return matchSearch && matchMethod;
    });

    if (!filtered.length) {
      list.innerHTML = `
        <div class="bg-white rounded-xl shadow-lg p-12 text-center">
          <svg class="w-16 h-16 text-gray-300 mx-auto mb-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="1.5">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2h5.586
                 a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
          <h3 class="text-xl text-gray-600 mb-2">No Receipts Found</h3>
          <p class="text-gray-500">Try adjusting your search or filter.</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(r => `
      <div class="bg-white rounded-xl shadow-lg p-6 hover:shadow-xl transition-all">
        <div class="flex items-start justify-between">
          <div class="flex-1">

            <!-- Receipt number + created by -->
            <div class="flex items-center gap-3 mb-4">
              <div class="w-12 h-12 rounded-full flex items-center justify-center shrink-0"
                   style="background:linear-gradient(135deg,#bbf7d0,#99f6e4);">
                <svg class="w-6 h-6 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                  <path stroke-linecap="round" stroke-linejoin="round"
                    d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2
                       h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
                </svg>
              </div>
              <div>
                <h3 class="text-lg font-semibold text-gray-900">${r.receiptNumber}</h3>
                <p class="text-sm text-gray-500">Created by ${r.createdBy} on ${fmtDate(r.paymentDate)}</p>
              </div>
            </div>

            <!-- Grid: Customer / Payment Date / Payment Method / Amount -->
            <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-4">
              <div>
                <div class="flex items-center gap-1 text-sm text-gray-500 mb-1">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
                    <circle cx="12" cy="7" r="4"/>
                  </svg>
                  Customer
                </div>
                <p class="font-semibold text-gray-900">${r.customerName}</p>
              </div>
              <div>
                <div class="flex items-center gap-1 text-sm text-gray-500 mb-1">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="3" y="4" width="18" height="18" rx="2" ry="2"/>
                    <line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="3" y1="10" x2="21" y2="10"/>
                  </svg>
                  Payment Date
                </div>
                <p class="font-semibold text-gray-900">${fmtDate(r.paymentDate)}</p>
              </div>
              <div>
                <div class="flex items-center gap-1 text-sm text-gray-500 mb-1">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
                    <line x1="1" y1="10" x2="23" y2="10"/>
                  </svg>
                  Payment Method
                </div>
                <p class="font-semibold text-gray-900">${methodLabel(r.paymentMethod)}</p>
              </div>
              <div>
                <div class="flex items-center gap-1 text-sm text-gray-500 mb-1">
                  <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <line x1="12" y1="1" x2="12" y2="23"/>
                    <path d="M17 5H9.5a3.5 3.5 0 000 7h5a3.5 3.5 0 010 7H6"/>
                  </svg>
                  Amount
                </div>
                <p class="font-semibold text-gray-900">RM ${r.total.toFixed(2)}</p>
              </div>
            </div>

            <!-- Badges: method + invoice + item count -->
            <div class="flex items-center gap-3 flex-wrap">
              <span class="px-3 py-1 rounded-full text-xs font-medium ${methodBadgeClass(r.paymentMethod)}">
                ${methodLabel(r.paymentMethod)}
              </span>
              ${r.invoiceNumber
                ? `<span class="px-3 py-1 rounded-full text-xs font-medium badge-invoice">Invoice: ${r.invoiceNumber}</span>`
                : ''}
              <span class="text-sm text-gray-500">${r.items.length} item${r.items.length > 1 ? 's' : ''}</span>
            </div>

          </div>

          <!-- View button only (no PDF button on list) -->
          <div class="ml-4 shrink-0">
            <button onclick="openModal('${r.id}')"
              class="flex items-center gap-2 px-4 py-2 bg-blue-100 text-blue-600 rounded-lg hover:bg-blue-200 transition-all">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                <path stroke-linecap="round" stroke-linejoin="round"
                  d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7
                     -1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
              </svg>
            </button>
          </div>

        </div>
      </div>
    `).join('');
  }

  // Modal 
  function openModal(id) {
    const r = receipts.find(x => x.id === id);
    if (!r) return;

    document.getElementById('modal-body').innerHTML = `

      <!-- Company header -->
      <div class="text-center mb-6 pb-6 border-b">
        <div class="w-16 h-16 mx-auto mb-3 rounded-xl flex items-center justify-center"
             style="background:linear-gradient(135deg,#22c55e,#14b8a6);">
          <svg class="w-8 h-8 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round"
              d="M9 12h6m-6 4h6m2 5H7a2 2 0 01-2-2V5a2 2 0 012-2
                 h5.586a1 1 0 01.707.293l5.414 5.414a1 1 0 01.293.707V19a2 2 0 01-2 2z"/>
          </svg>
        </div>
        <h3 class="text-xl font-semibold mb-1">PAYMENT RECEIPT</h3>
        <p class="text-gray-600">Meowy Groom Management System</p>
        <div class="text-sm text-gray-500 mt-2">
          <p>G9, Jalan KNMP 2A, 2, Kompleks Niaga</p>
          <p>Melaka Perdana, 75450 Ayer Keroh, Melaka</p>
          <p class="mt-1">Phone: +60 10-774 5512 &nbsp;|&nbsp; Email: support@meowygroom.com</p>
        </div>
      </div>

      <!-- PAYMENT RECEIVED banner -->
      <div class="bg-green-50 border-2 border-green-200 rounded-lg p-4 mb-6 flex items-center gap-3">
        <svg class="w-8 h-8 text-green-600 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>
        </svg>
        <div>
          <p class="text-lg font-bold text-green-700">PAYMENT RECEIVED</p>
          <p class="text-sm text-gray-600">This receipt confirms payment has been received in full</p>
        </div>
      </div>

      <!-- Receipt + Confirmation number box -->
      <div class="bg-green-50 border-2 border-green-200 rounded-lg p-6 mb-6">
        <div class="grid md:grid-cols-2 gap-4">
          <div>
            <p class="text-sm text-gray-500 mb-1">Receipt Number</p>
            <p class="text-xl font-bold text-green-700">${r.receiptNumber}</p>
          </div>
          <div class="md:text-right">
            <p class="text-sm text-gray-500 mb-1">Confirmation Number</p>
            <p class="text-xl font-bold text-green-700">${r.confirmationNumber}</p>
          </div>
        </div>
      </div>

      <!-- Received From + Payment Information -->
      <div class="grid md:grid-cols-2 gap-6 mb-6">
        <div>
          <div class="flex items-center gap-2 mb-3">
            <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <path stroke-linecap="round" stroke-linejoin="round" d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/>
              <circle cx="12" cy="7" r="4"/>
            </svg>
            <h3 class="text-lg font-semibold">Received From</h3>
          </div>
          <div class="bg-gray-50 rounded-lg p-4">
            <p class="font-semibold text-gray-900 mb-1">${r.customerName}</p>
            <p class="text-sm text-gray-600">${r.customerEmail}</p>
            <p class="text-sm text-gray-600">Customer ID: #${r.customerId}</p>
          </div>
        </div>
        <div>
          <div class="flex items-center gap-2 mb-3">
            <svg class="w-5 h-5 text-green-600" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
              <rect x="1" y="4" width="22" height="16" rx="2" ry="2"/>
              <line x1="1" y1="10" x2="23" y2="10"/>
            </svg>
            <h3 class="text-lg font-semibold">Payment Information</h3>
          </div>
          <div class="bg-gray-50 rounded-lg p-4 space-y-2 text-sm">
            <div class="flex justify-between">
              <span class="text-gray-600">Payment Date:</span>
              <span class="font-medium text-gray-900">${fmtDate(r.paymentDate)}</span>
            </div>
            <div class="flex justify-between">
              <span class="text-gray-600">Payment Method:</span>
              <span class="font-medium text-gray-900">${methodLabel(r.paymentMethod)}</span>
            </div>
            ${r.invoiceNumber ? `
            <div class="flex justify-between">
              <span class="text-gray-600">Invoice Reference:</span>
              <span class="font-medium text-purple-600">${r.invoiceNumber}</span>
            </div>` : ''}
          </div>
        </div>
      </div>

      <!-- Items table -->
      <div class="mb-6">
        <h4 class="font-semibold mb-3">Payment Details</h4>
        <div class="border border-gray-200 rounded-lg overflow-hidden">
          <table class="w-full">
            <thead class="bg-gray-50">
              <tr>
                <th class="text-left px-4 py-3 text-sm font-semibold text-gray-700">Description</th>
                <th class="text-right px-4 py-3 text-sm font-semibold text-gray-700">Amount</th>
              </tr>
            </thead>
            <tbody class="divide-y divide-gray-200">
              ${r.items.map(item => `
                <tr>
                  <td class="px-4 py-3 text-gray-900">${item.description}</td>
                  <td class="px-4 py-3 text-right text-gray-900">RM ${item.amount.toFixed(2)}</td>
                </tr>
              `).join('')}
            </tbody>
          </table>
        </div>
      </div>

      <!-- Totals -->
      <div class="flex justify-end mb-6">
        <div class="w-full md:w-1/2 bg-gray-50 rounded-lg p-6">
          <div class="flex justify-between text-gray-700 mb-2">
            <span>Subtotal:</span>
            <span class="font-medium">RM ${r.subtotal.toFixed(2)}</span>
          </div>
          <div class="flex justify-between text-xl pt-2 border-t-2 border-gray-300">
            <span class="font-semibold">Total Amount:</span>
            <span class="font-bold text-green-600">RM ${r.total.toFixed(2)}</span>
          </div>
        </div>
      </div>

      <!-- Footer -->
      <p class="text-xs text-gray-400 text-center">
        This is an official payment receipt from Meowy Groom Management System.<br>
        Please retain this receipt for your records.
      </p>
    `;

    document.getElementById('modal').style.display = 'flex';
    document.body.style.overflow = 'hidden';
  }

  function closeModal() {
    document.getElementById('modal').style.display = 'none';
    document.body.style.overflow = '';
  }

  document.getElementById('modal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  //Init
  renderList();
</script>
</body>
</html>
