<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Register Page</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/register.css">
</head>

<body>

<div class="container">

  <!-- Header -->
  <div class="header">
    <div class="logo">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
    </div>

    <h1>Register Page</h1>
    <p>Account Registration</p>
  </div>

  <!-- Card -->
  <div class="card">

    <form action=""></form>

      <!-- Fullname -->
      <div class="field">
        <label>Full Name</label>

        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>

          <input type="text" placeholder="Enter your full name">
        </div>
      </div>

      <!-- Username -->
      <div class="field">
        <label>Username</label>

        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
            <circle cx="12" cy="7" r="4"/>
          </svg>

          <input type="text" placeholder="Choose a username">
        </div>
      </div>

      <!-- Phone -->
      <div class="field">
        <label>Phone Number</label>

        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12a19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 3.61 1h3a2 2 0 0 1 2 1.72"/>
          </svg>

          <input type="tel" placeholder="Enter your phone number">
        </div>
      </div>

      <!-- Email -->
      <div class="field">
        <label>Email</label>

        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"/>
          </svg>

          <input type="email" placeholder="Enter your email">
        </div>
      </div>

      <!-- Password -->
      <div class="field">
        <label>Password</label>

        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>

          <input type="password" placeholder="Create a password">
        </div>
      </div>

      <!-- Confirm Password -->
      <div class="field">
        <label>Confirm Password</label>

        <div class="input-wrap">
          <svg viewBox="0 0 24 24">
            <rect x="3" y="11" width="18" height="11" rx="2"/>
            <path d="M7 11V7a5 5 0 0 1 10 0v4"/>
          </svg>

          <input type="password" placeholder="Confirm your password">
        </div>
      </div>

      <!-- Buttons -->
      <div class="btn-row">
        <button type="submit" class="btn btn-register" onclick="window.location.href='loginPage.html'">Register</button>

        <button type="reset" class="btn btn-cancel" onclick="window.location.href='loginPage.html'">Cancel</button>
      </div>
    </form>

    <!-- Login Link -->
    <div class="login-link">
      Already have an account?
      <a href="../main/loginPage.html">Log in</a>
    </div>

  </div>
</div>

</body>
</html>
