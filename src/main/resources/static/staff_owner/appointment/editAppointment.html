<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Appointment</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/editAppointment.css" />
</head>
<body>

<div class="overlay" id="overlay">
  <div class="card" id="mainCard">

    <!-- Header -->
    <div class="modal-header">
      <div class="header-left">
        <div class="header-icon">📅</div>
        <div>
          <div class="header-title">Edit Appointment</div>
          <div class="header-sub">Update appointment details</div>
        </div>
      </div>
      <button class="btn-close" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <!-- Form -->
    <form id="appointmentForm" onsubmit="handleSubmit(event)">

      <!-- Customer Name (read-only) -->
      <div class="customer-box">
        <label class="field-label">
          <svg style="display:inline;width:15px;height:15px;vertical-align:middle;margin-right:6px;color:#7c3aed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          Customer Name
        </label>
        <div class="readonly-val" id="customerNameDisplay"></div>
        <p class="hint">* Customer name cannot be changed</p>
      </div>

      <!-- Date + Time -->
      <div class="grid-2">
        <!-- Date -->
        <div class="relative">
          <label class="field-label">
            <svg style="display:inline;width:15px;height:15px;vertical-align:middle;margin-right:6px;color:#7c3aed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
            Date
          </label>
          <button type="button" class="picker-btn" id="dateBtn" onclick="toggleCalendar()">Select date</button>
          <div class="popup calendar-popup" id="calendarPopup">
            <div class="cal-nav">
              <button type="button" class="cal-nav-btn" onclick="prevMonth()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg>
              </button>
              <span class="cal-month" id="calMonthLabel"></span>
              <button type="button" class="cal-nav-btn" onclick="nextMonth()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>
              </button>
            </div>
            <div class="cal-grid" id="calGrid"></div>
          </div>
        </div>

        <!-- Time -->
        <div class="relative">
          <label class="field-label">
            <svg style="display:inline;width:15px;height:15px;vertical-align:middle;margin-right:6px;color:#7c3aed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
            Time
          </label>
          <button type="button" class="picker-btn" id="timeBtn" onclick="toggleTime()">Select time</button>
          <div class="popup time-popup" id="timePopup">
            <!-- filled by JS -->
          </div>
        </div>
      </div>

      <!-- Cat Names -->
      <div>
        <label class="field-label">
          🐱 Cat(s)
        </label>
        <div class="cat-tags" id="catTags"></div>
      </div>

      <!-- Services -->
      <div class="services-space">
        <div class="section-title">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M6 3h12l4 6-10 13L2 9z"/><path d="M11 3L8 9l4 13 4-13-3-6"/><path d="M2 9h20"/></svg>
          Grooming Services
        </div>

        <!-- Main Packages -->
        <div>
          <div class="sub-title">
            <svg viewBox="0 0 24 24" fill="currentColor" style="color:#7c3aed"><polygon points="12 2 15.09 8.26 22 9.27 17 14.14 18.18 21.02 12 17.77 5.82 21.02 7 14.14 2 9.27 8.91 8.26 12 2"/></svg>
            Main Grooming Packages
          </div>
          <div id="packageList" class="space-y"></div>
        </div>

        <!-- Add-on Services -->
        <div>
          <div class="sub-title">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="color:#3b82f6"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
            Add-On Services (Optional)
          </div>
          <div id="addonList" class="space-y"></div>
        </div>

        <!-- Total -->
        <div class="total-box" id="totalBox" style="display:none">
          <span class="total-label">Total:</span>
          <span class="total-amount" id="totalAmount">RM 0.00</span>
        </div>
      </div>

      <!-- Special Notes -->
      <div>
        <label class="field-label">
          📝 Special Notes
        </label>
        <textarea id="specialNotes" rows="3" placeholder="Add any special instructions or notes..."></textarea>
      </div>

      <!-- Status -->
      <div>
        <label class="field-label">Status</label>
        <select id="statusSelect" class="status-select">
          <option value="pending">Pending</option>
          <option value="confirmed">Confirmed</option>
          <option value="completed">Completed</option>
        </select>
      </div>

      <!-- Buttons -->
      <div class="action-row">
        <button type="button" class="btn-save" onclick="window.location.href = 'appointmentManagement.html';">
          Save
        </button>
        <button type="button" class="btn-cancel" onclick="closeModal()">Cancel</button>
      </div>

    </form>
  </div>
</div>

<script>
  // ── Sample appointment data ─────────────────────────────────────────────
  const appointment = {
    customerName: 'Sarah Johnson',
    date: '2026-05-20',
    time: '10:00 AM',
    status: 'confirmed',
    catNames: ['Whiskers', 'Luna'],
    services: [
      { id: 'long-hair',    weightTier: null },
      { id: 'flea-removal', weightTier: null },
      { id: 'trimming',     weightTier: null },
    ],
    specialNotes: 'Luna is a bit shy around strangers.'
  };

  // ── Service Catalog ─────────────────────────────────────────────────────
  const packageServices = [
    {
      id: 'kitten',
      name: 'Kitten Package',
      description: 'Gentle grooming designed for kittens under 4 months old.',
      weightBased: {
        prices: [
          { weight: 'Below 1.5 kg', price: 35 },
          { weight: '1.6 kg – 2.5 kg', price: 40 },
        ]
      },
      requirements: ['Kittens must be below 4 months old']
    },
    {
      id: 'short-hair',
      name: 'Short-hair Package',
      description: 'Bath & dry, nail clipping, eye & ear cleaning. Great for short-haired cats.',
      price: 55
    },
    {
      id: 'long-hair',
      name: 'Long-hair Package',
      description: 'Bath & dry, nail clipping, eye & ear cleaning. Great for long-haired cats.',
      price: 60
    },
    {
      id: 'lion-cut',
      name: 'Lion Cut',
      description: 'Full body shave leaving a mane around the head and fluffy tail tip.',
      price: 120
    }
  ];

  const addonServices = [
    { id: 'medicated-shampoo', name: 'Medicated Shampoo + Scrubbing',              description: 'Hypoallergenic or medicated shampoo for sensitive or problem skin.',                          price: 10 },
    { id: 'trimming',          name: 'Trimming - Paw & Sanitary Area', description: 'Trimming the paw and sanitary area for cleanliness, comfort and hygiene.',                     price: 20 },
    { id: 'flea-removal',      name: 'Flea Removal',                   description: 'Topical flea and tick treatment applied during the bath.',                                      price: 20 },
  ];

  // ── State ───────────────────────────────────────────────────────────────
  let selectedDate = appointment.date;
  let selectedTime = appointment.time;
  let selectedServices = [];   // resolved service objects { id, name, price, ... }
  let weightSelections = {};   // { serviceId: weightTier }

  // Pre-resolve booked services from appointment.services
  appointment.services.forEach(booked => {
    const catalog = [...packageServices, ...addonServices].find(s => s.id === booked.id);
    if (!catalog) return;
    if (catalog.weightBased && booked.weightTier) {
      const tier = catalog.weightBased.prices.find(p => p.weight === booked.weightTier);
      if (tier) {
        weightSelections[booked.id] = booked.weightTier;
        selectedServices.push({ id: catalog.id, name: catalog.name, description: catalog.description, price: tier.price, weightTier: booked.weightTier });
      } else {
        // Weight tier not matched — mark as selected but unpicked
        weightSelections[booked.id] = '';
      }
    } else if (!catalog.weightBased) {
      selectedServices.push({ id: catalog.id, name: catalog.name, description: catalog.description, price: catalog.price });
    }
  });

  let calDate = new Date(appointment.date || new Date());
  let showCal = false, showTime = false;

  const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  const DAYS   = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];
  const TIME_SLOTS = ['09:00 AM','10:00 AM','11:00 AM','12:00 PM','02:00 PM','03:00 PM','04:00 PM','05:00 PM'];

  // ── Init ────────────────────────────────────────────────────────────────
  function init() {
    document.getElementById('customerNameDisplay').textContent = appointment.customerName;
    document.getElementById('specialNotes').value = appointment.specialNotes || '';
    document.getElementById('statusSelect').value = appointment.status || 'pending';

    // Cat tags
    const tagsEl = document.getElementById('catTags');
    appointment.catNames.forEach(name => {
      const span = document.createElement('span');
      span.className = 'cat-tag';
      span.textContent = name;
      tagsEl.appendChild(span);
    });

    updateDateBtn();
    updateTimeBtn();
    renderCalendar();
    renderTimeList();
    renderPackages();
    renderAddons();
    updateTotal();

    // Close popups on outside click
    document.addEventListener('click', e => {
      const cal  = document.getElementById('calendarPopup');
      const time = document.getElementById('timePopup');
      if (!document.getElementById('dateBtn').contains(e.target) && !cal.contains(e.target)) closeCal();
      if (!document.getElementById('timeBtn').contains(e.target) && !time.contains(e.target)) closeTime();
    });
  }

  // ── Calendar ────────────────────────────────────────────────────────────
  function toggleCalendar() { showCal ? closeCal() : openCal(); }
  function openCal()  { showCal = true;  document.getElementById('calendarPopup').classList.add('open'); closeTime(); }
  function closeCal() { showCal = false; document.getElementById('calendarPopup').classList.remove('open'); }

  function prevMonth() { calDate = new Date(calDate.getFullYear(), calDate.getMonth() - 1); renderCalendar(); }
  function nextMonth() { calDate = new Date(calDate.getFullYear(), calDate.getMonth() + 1); renderCalendar(); }

  function renderCalendar() {
    document.getElementById('calMonthLabel').textContent = `${MONTHS[calDate.getMonth()]} ${calDate.getFullYear()}`;
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    DAYS.forEach(d => {
      const el = document.createElement('div');
      el.className = 'cal-day-name';
      el.textContent = d;
      grid.appendChild(el);
    });

    const year = calDate.getFullYear(), month = calDate.getMonth();
    const firstDay = new Date(year, month, 1).getDay();
    const daysInMonth = new Date(year, month + 1, 0).getDate();
    const today = new Date(); today.setHours(0,0,0,0);

    for (let i = 0; i < firstDay; i++) {
      const el = document.createElement('div'); el.className = 'cal-empty'; grid.appendChild(el);
    }

    for (let day = 1; day <= daysInMonth; day++) {
      const date = new Date(year, month, day);
      const isPast = date < today;
      const dateStr = `${year}-${String(month+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
      const isSelected = selectedDate === dateStr;

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'cal-day' + (isSelected ? ' selected' : '');
      btn.textContent = day;
      if (isPast) {
        btn.disabled = true;
      } else {
        btn.onclick = () => { selectedDate = dateStr; updateDateBtn(); closeCal(); renderCalendar(); };
      }
      grid.appendChild(btn);
    }
  }

  function updateDateBtn() {
    const btn = document.getElementById('dateBtn');
    if (selectedDate) {
      const d = new Date(selectedDate + 'T00:00:00');
      btn.textContent = d.toLocaleDateString('en-US', { weekday:'short', year:'numeric', month:'short', day:'numeric' });
    } else {
      btn.textContent = 'Select date';
    }
  }

  // ── Time ────────────────────────────────────────────────────────────────
  function toggleTime() { showTime ? closeTime() : openTime(); }
  function openTime()  { showTime = true;  document.getElementById('timePopup').classList.add('open'); closeCal(); }
  function closeTime() { showTime = false; document.getElementById('timePopup').classList.remove('open'); }

  function renderTimeList() {
    const popup = document.getElementById('timePopup');
    popup.innerHTML = '';
    TIME_SLOTS.forEach(t => {
      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = 'time-btn' + (selectedTime === t ? ' selected' : '');
      btn.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg> ${t}`;
      btn.onclick = () => { selectedTime = t; updateTimeBtn(); closeTime(); renderTimeList(); };
      popup.appendChild(btn);
    });
  }

  function updateTimeBtn() {
    document.getElementById('timeBtn').textContent = selectedTime || 'Select time';
  }

  // ── Services ────────────────────────────────────────────────────────────
  function isSelected(id) {
    return selectedServices.some(s => s.id === id) || weightSelections[id] !== undefined;
  }

  function toggleService(id) {
    const svc = [...packageServices, ...addonServices].find(s => s.id === id);
    if (!svc) return;

    if (isSelected(id)) {
      selectedServices = selectedServices.filter(s => s.id !== id);
      delete weightSelections[id];
    } else {
      if (svc.weightBased) {
        weightSelections[id] = '';
        // Don't add to selectedServices until weight is chosen
      } else {
        selectedServices.push({ id: svc.id, name: svc.name, description: svc.description, price: svc.price });
      }
    }
    renderPackages();
    renderAddons();
    updateTotal();
  }

  function handleWeightChange(id, weightTier, price) {
    const svc = packageServices.find(s => s.id === id);
    if (!svc) return;
    weightSelections[id] = weightTier;
    selectedServices = selectedServices.filter(s => s.id !== id);
    if (weightTier) {
      selectedServices.push({ id, name: svc.name, description: svc.description, price, weightTier });
    }
    updateTotal();
    renderPackages();
    renderAddons();
  }

  function renderPackages() {
    const list = document.getElementById('packageList');
    list.innerHTML = '';

    packageServices.forEach(svc => {
      const sel = isSelected(svc.id);
      const card = document.createElement('div');
      card.className = 'service-card' + (sel ? ' selected-purple' : '');

      if (svc.weightBased) {
        const currentPrice = selectedServices.find(s => s.id === svc.id)?.price;
        card.innerHTML = `
          <div class="service-inner">
            <div class="checkbox ${sel ? 'checked-purple' : ''}" onclick="toggleService('${svc.id}')">
              ${sel ? checkSvg() : ''}
            </div>
            <div class="service-info">
              <div class="service-name ${sel ? 'purple' : ''}">${svc.name}</div>
              <div class="service-desc ${sel ? 'purple' : ''}">${svc.description}</div>
              ${svc.requirements ? `<div class="service-desc" style="font-style:italic;margin-top:2px">⚠️ ${svc.requirements[0]}</div>` : ''}
              ${sel ? `
                <select class="weight-select" onchange="handleWeightChange('${svc.id}', this.options[this.selectedIndex].dataset.weight, parseFloat(this.options[this.selectedIndex].dataset.price))" onclick="event.stopPropagation()">
                  <option value="">-- Select weight --</option>
                  ${svc.weightBased.prices.map(p => `<option data-weight="${p.weight}" data-price="${p.price}" ${weightSelections[svc.id]===p.weight?'selected':''}>${p.weight} – RM ${p.price.toFixed(2)}</option>`).join('')}
                </select>` : ''}
            </div>
            ${sel && currentPrice ? `<div class="service-price purple">RM ${currentPrice.toFixed(2)}</div>` : ''}
          </div>`;
      } else {
        card.innerHTML = `
          <div class="service-inner" onclick="toggleService('${svc.id}')">
            <div class="checkbox ${sel ? 'checked-purple' : ''}">${sel ? checkSvg() : ''}</div>
            <div class="service-info">
              <div class="service-name ${sel ? 'purple' : ''}">${svc.name}</div>
              <div class="service-desc ${sel ? 'purple' : ''}">${svc.description}</div>
            </div>
            <div class="service-price ${sel ? 'purple' : ''}">RM ${svc.price.toFixed(2)}</div>
          </div>`;
      }

      list.appendChild(card);
    });
  }

  function renderAddons() {
    const list = document.getElementById('addonList');
    list.innerHTML = '';

    addonServices.forEach(svc => {
      const sel = isSelected(svc.id);
      const card = document.createElement('div');
      card.className = 'service-card' + (sel ? ' selected-blue' : '');
      card.style.cursor = 'pointer';
      card.innerHTML = `
        <div class="service-inner" onclick="toggleService('${svc.id}')">
          <div class="checkbox ${sel ? 'checked-blue' : ''}">${sel ? checkSvg() : ''}</div>
          <div class="service-info">
            <div class="service-name ${sel ? 'blue' : ''}">${svc.name}</div>
            <div class="service-desc ${sel ? 'blue' : ''}">${svc.description}</div>
          </div>
          <div class="service-price ${sel ? 'blue' : ''}">RM ${svc.price.toFixed(2)}</div>
        </div>`;
      list.appendChild(card);
    });
  }

  function checkSvg() {
    return `<svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><polyline points="20 6 9 17 4 12"/></svg>`;
  }

  function updateTotal() {
    const total = selectedServices.reduce((sum, s) => sum + s.price, 0);
    const box = document.getElementById('totalBox');
    if (selectedServices.length > 0) {
      box.style.display = 'flex';
      document.getElementById('totalAmount').textContent = `RM ${total.toFixed(2)}`;
    } else {
      box.style.display = 'none';
    }
  }

  // ── Submit ───────────────────────────────────────────────────────────────
  function handleSubmit(e) {
    e.preventDefault();
    if (!selectedDate || !selectedTime) { alert('Please select both date and time.'); return; }
    if (selectedServices.length === 0) { alert('Please select at least one service.'); return; }

    const updated = {
      ...appointment,
      date: selectedDate,
      time: selectedTime,
      status: document.getElementById('statusSelect').value,
      services: selectedServices,
      total: selectedServices.reduce((sum, s) => sum + s.price, 0),
      specialNotes: document.getElementById('specialNotes').value
    };

    console.log('Saved appointment:', updated);
    alert(`✅ Appointment saved!\n\nDate: ${updated.date}\nTime: ${updated.time}\nTotal: RM ${updated.total.toFixed(2)}`);
    closeModal();
  }

  function closeModal() {
    window.location.href = 'appointmentManagement.html';
  }

  init();
</script>
</body>
</html>
