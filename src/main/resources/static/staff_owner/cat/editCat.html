<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Cat Information</title>
    <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
    <style>
        body { 
            background-color: #f3f4f6; 
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; 
            padding: 40px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
        .container { width: 100%; max-width: 850px; }
        
        .back-nav { margin-bottom: 12px; display: flex; align-items: center; }
        .back-link { display: flex; align-items: center; gap: 8px; color: #7c3aed; text-decoration: none; font-weight: 500; font-size: 16px; }

        .card { background: white; width: 100%; padding: 40px; border-radius: 20px; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); box-sizing: border-box; }
        
        /* HEADER BARU: Gambar di kiri, Teks di kanan */
        .header { 
            display: flex; 
            align-items: center; 
            gap: 20px; 
            margin-bottom: 32px; 
            border-bottom: 1px solid #f3f4f6; 
            padding-bottom: 24px; 
        }

        /* Tajuk dinipiskan (font-weight: 500 atau 400) */
        h2 { 
            margin: 0; 
            font-size: 28px; 
            font-weight: 500; 
            color: #111827; 
            letter-spacing: -0.01em;
        }

        /* CSS untuk Photo Hover dalam Header */
        .photo-wrapper { 
            position: relative; 
            width: 80px; 
            height: 80px; 
            cursor: pointer; 
            border-radius: 50%; 
            overflow: hidden; 
            background: #f3f4f6; 
            flex-shrink: 0; /* Elakkan gambar mengecil */
            border: 1px solid #e5e7eb;
        }
        .preview-img { width: 100%; height: 100%; object-fit: cover; }
        .photo-overlay { 
            position: absolute; 
            inset: 0; 
            background: rgba(0,0,0,0.5); 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            opacity: 0; 
            transition: opacity 0.2s; 
            color: white; 
            font-size: 10px; 
            font-weight: bold; 
            text-transform: uppercase; 
        }
        .photo-wrapper:hover .photo-overlay { opacity: 1; }
        
        .remove-photo { 
            position: absolute; 
            top: 0; 
            right: 0; 
            background: #ef4444; 
            color: white; 
            border: 1px solid white; 
            border-radius: 50%; 
            width: 20px; 
            height: 20px; 
            cursor: pointer; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            z-index: 10; 
            opacity: 0; 
            transition: opacity 0.2s; 
        }
        .photo-wrapper:hover .remove-photo { opacity: 1; }

        /* Form & Grid Kekal Sama */
        .form-group { margin-bottom: 24px; }
        label { display: block; font-size: 14px; font-weight: 600; color: #374151; margin-bottom: 8px; }
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #d1d5db; border-radius: 8px; font-size: 16px; box-sizing: border-box; }
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 24px; }

        .owner-read-only { background: #f9fafb; padding: 16px; border-radius: 8px; display: flex; justify-content: space-between; align-items: center; border: 1px solid #f3f4f6; }
        
        .btn-row { display: flex; gap: 16px; margin-top: 32px; padding-top: 24px; border-top: 1px solid #f3f4f6; }
        .btn { flex: 1; padding: 14px; border-radius: 8px; font-weight: 600; font-size: 16px; cursor: pointer; text-align: center; border: none; text-decoration: none; }
        .btn-save { background: #059669; color: white; }
        .btn-cancel { background: #ef4444; color: white; }
    </style>
</head>
<body>
    <div class="container">
        <nav class="back-nav">
            <a href="index.html" class="back-link"><i data-lucide="arrow-left"></i> Back</a>
        </nav>

        <div class="card">
            <div class="header">
                <div class="photo-wrapper" onclick="document.getElementById('fileInput').click()">
                    <img id="photoPreview" class="preview-img" src="">
                    <div class="photo-overlay">Change</div>
                    <button type="button" class="remove-photo" onclick="event.stopPropagation(); removePhoto()">
                        <i data-lucide="x" style="width:10px"></i>
                    </button>
                </div>
                <input type="file" id="fileInput" hidden onchange="handleUpload(this)" accept="image/*">
                
                <h2>Edit Cat Information</h2>
            </div>
            
            <form id="editForm">
                <div class="form-group">
                    <label>Cat Name *</label>
                    <input type="text" id="name" required>
                </div>
                <div class="grid">
                    <div class="form-group"><label>Breed *</label><select id="breed" required></select></div>
                    <div class="form-group"><label>Gender</label><select id="gender"><option>Male</option><option>Female</option></select></div>
                    <div class="form-group"><label>Age (years) *</label><input type="number" id="age" required></div>
                    <div class="form-group"><label>Weight (kg)</label><input type="number" step="0.1" id="weight"></div>
                </div>
                <div class="form-group"><label>Special Notes</label><textarea id="notes" rows="3"></textarea></div>
                
                <div class="form-group">
                    <label>Owner</label>
                    <div class="owner-read-only">
                        <span id="ownerName" style="font-weight: 600;"></span>
                        <span style="color: #9ca3af; font-style: italic; font-size: 12px;">(Cannot be changed)</span>
                    </div>
                </div>
                <div class="btn-row">
                    <button type="submit" class="btn btn-save">Save</button>
                    <a href="index.html" class="btn btn-cancel">Cancel</a>
                </div>
            </form>
        </div>
    </div>

    <script>
        const params = new URLSearchParams(window.location.search);
        const catId = params.get('id');
        let cats = JSON.parse(localStorage.getItem('cats')) || [];
        let catIndex = cats.findIndex(c => c.id === catId);
        let currentCat = cats[catIndex];

        const breeds = ["Persian", "Siamese", "British Shorthair", "Maine Coon", "Ragdoll"];
        const bSelect = document.getElementById('breed');
        breeds.forEach(b => {
            let opt = document.createElement('option');
            opt.value = b; opt.innerText = b;
            if(currentCat && b === currentCat.breed) opt.selected = true;
            bSelect.appendChild(opt);
        });

        if (currentCat) {
            document.getElementById('name').value = currentCat.name;
            document.getElementById('gender').value = currentCat.gender;
            document.getElementById('age').value = currentCat.age;
            document.getElementById('weight').value = currentCat.weight;
            document.getElementById('notes').value = currentCat.specialNotes || '';
            document.getElementById('ownerName').innerText = currentCat.ownerName;
            document.getElementById('photoPreview').src = currentCat.photo || '';
        }

        let tempPhotoData = currentCat ? currentCat.photo : '';
        function handleUpload(input) {
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tempPhotoData = e.target.result;
                    document.getElementById('photoPreview').src = tempPhotoData;
                };
                reader.readAsDataURL(input.files[0]);
            }
        }
        function removePhoto() { tempPhotoData = ''; document.getElementById('photoPreview').src = ''; }

        document.getElementById('editForm').onsubmit = (e) => {
            e.preventDefault();
            cats[catIndex] = { ...currentCat, name: document.getElementById('name').value, breed: document.getElementById('breed').value, gender: document.getElementById('gender').value, age: document.getElementById('age').value, weight: document.getElementById('weight').value, specialNotes: document.getElementById('notes').value, photo: tempPhotoData };
            localStorage.setItem('cats', JSON.stringify(cats));
            window.location.href = 'index.html';
        };
        lucide.createIcons();
    </script>
</body>
</html>
