<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>View Cat Information</title>
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.js"></script>
  <style>
    body { 
            background-color: #f3f4f6; 
            font-family: ui-sans-serif, system-ui, -apple-system, sans-serif; 
            padding: 40px; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
        }
    .container { width: 100%; max-width: 900px; }
    
    .card { background: rgb(255, 254, 254); width: 90%; max-width: 700px; padding: 40px; border-radius: 24px; box-shadow: 0 10px 25px rgba(0,0,0,0.05); }
    .back-link { color: #7c3aed; text-decoration: none; font-weight: 500; display: flex; align-items: center; gap: 8px; margin-bottom: 30px; }
    
    .profile-header { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; }
    .profile-header img { width: 100px; height: 100px; border-radius: 50%; object-fit: cover; border: 4px solid #f8fafc; }
    .profile-header h2 { margin: 0; font-size: 32px; color: #0f172a; }
    .breed-tag { color: #a855f7; background: #f5f3ff; padding: 4px 12px; border-radius: 20px; font-size: 14px; font-weight: 600; display: inline-block; margin: 5px 0; }
    .owner-sub { color: #64748b; margin: 0; font-size: 15px; }

    .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
    .info-box { background: #f8fafc; padding: 20px; border-radius: 12px; }
    .label { font-size: 11px; color: #94a3b8; text-transform: uppercase; font-weight: 700; letter-spacing: 0.05em; }
    .value { font-size: 18px; font-weight: 700; color: #1e293b; margin-top: 8px; }
    
    .notes-box { grid-column: span 2; background: #fffbeb; border: 1px solid #fef3c7; padding: 20px; border-radius: 12px; }
    .notes-box .label { color: #b45309; }
    .notes-box p { margin: 10px 0 0 0; color: #92400e; font-size: 16px; }
  </style>
</head>
<body>
    <div class="card">
        <nav class="back-nav">
            <a href="index.html" class="back-link"><i data-lucide="arrow-left"></i> Back</a>
            <div id="content"></div>
        </nav>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const cats = JSON.parse(localStorage.getItem('cats'));
    const cat = cats.find(c => c.id === params.get('id'));

    function formatDate(dateStr) {
      const date = new Date(dateStr);
      const day = date.getDate();
      const month = date.toLocaleString('default', { month: 'long' });
      const year = date.getFullYear();
      return `${day} ${month} ${year}`;
    }

    if (cat) {
      document.getElementById('content').innerHTML = `
        <div class="profile-header">
          <img src="${cat.photo}">
          <div>
            <h2>${cat.name}</h2>
            <div class="breed-tag">${cat.breed}</div>
            <p class="owner-sub">Owner: ${cat.ownerName}</p>
          </div>
        </div>
        <div class="grid">
          <div class="info-box"><div class="label">Age</div><div class="value">${cat.age} years old</div></div>
          <div class="info-box"><div class="label">Gender</div><div class="value">${cat.gender}</div></div>
          <div class="info-box"><div class="label">Weight</div><div class="value">${cat.weight} kg</div></div>
          <div class="info-box"><div class="label">Breed</div><div class="value">${cat.breed}</div></div>
          
          <div class="notes-box">
            <div class="label">Special Notes</div>
            <p>${cat.specialNotes || 'No notes available'}</p>
          </div>
          <div class="info-box" style="grid-column: span 2;">
            <div class="label">Registered On</div>
            <div class="value">${formatDate(cat.createdAt)}</div>
          </div>
        </div>
      `;
    }
    lucide.createIcons();
  </script>
</body>
</html>
