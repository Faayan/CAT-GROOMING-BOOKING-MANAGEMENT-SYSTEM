<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meowy Groom – User Management</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/profilePage.css">
  <style>
    /* ── Delete Modal ─────────────────────────────────────────────────────── */
    .dialog-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 50;
      align-items: center;
      justify-content: center;
      padding: 1rem;
      animation: dmFadeIn 0.15s ease;
    }
    .dialog-overlay.open { display: flex; }

    @keyframes dmFadeIn {
      from { opacity: 0; }
      to   { opacity: 1; }
    }
    @keyframes dmSlideUp {
      from { opacity: 0; transform: translateY(12px) scale(0.97); }
      to   { opacity: 1; transform: translateY(0) scale(1); }
    }

    .dialog-content {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.18);
      padding: 1.5rem;
      width: 100%;
      max-width: 28rem;
      animation: dmSlideUp 0.2s ease;
    }

    .dialog-header { margin-bottom: 0.75rem; }

    .dialog-title-row {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      margin-bottom: 0.5rem;
    }

    .icon-circle {
      width: 3rem; height: 3rem;
      background: #fee2e2;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .icon-circle svg { width: 1.5rem; height: 1.5rem; color: #dc2626; stroke: #dc2626; }

    .dialog-title { font-size: 1.25rem; font-weight: 700; color: #111827; }

    .dialog-description { font-size: 0.95rem; color: #6b7280; line-height: 1.5; padding-top: 0.5rem; }

    .dialog-footer { display: flex; gap: 0.75rem; margin-top: 1.5rem; }

    .dm-btn {
      flex: 1;
      display: inline-flex; align-items: center; justify-content: center; gap: 0.4rem;
      padding: 0.55rem 1rem;
      font-size: 0.9rem; font-weight: 600;
      border-radius: 8px; border: none; cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s, transform 0.1s;
    }
    .dm-btn:active { transform: scale(0.97); }
    .dm-btn svg { width: 1rem; height: 1rem; }

    .dm-btn-outline {
      background: #fff;
      border: 1.5px solid #d1d5db;
      color: #374151;
    }
    .dm-btn-outline:hover { background: #f9fafb; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }

    .dm-btn-danger { background: #dc2626; color: #fff; }
    .dm-btn-danger:hover { background: #b91c1c; box-shadow: 0 2px 8px rgba(220,38,38,0.35); }
  </style>
</head>
<body>

<div class="layout">
  <main class="main">
    <div class="search-wrap">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="searchInput" placeholder="Search by name, email, or username..." oninput="renderTable()" />
    </div>

    <div class="filter-tabs">
      <button class="filter-tab active" onclick="setFilter(this,'all')">All Users</button>
      <button class="filter-tab" onclick="setFilter(this,'customer')">Customers</button>
      <button class="filter-tab" onclick="setFilter(this,'staff')">Staff</button>
      <button class="filter-tab" onclick="setFilter(this,'owner')">Owners</button>
    </div>

    <div class="table-card">
      <table>
        <thead>
          <tr>
            <th>User</th><th>Contact</th><th>Role</th><th>Joined</th><th>Actions</th>
          </tr>
        </thead>
        <tbody id="tableBody"></tbody>
      </table>
      <div id="emptyState" class="empty hidden">No users found.</div>
    </div>
  </main>
</div>

<!-- Delete Modal -->
<div class="dialog-overlay" id="deleteModal" role="dialog" aria-modal="true" aria-labelledby="modalTitle">
  <div class="dialog-content">
    <div class="dialog-header">
      <div class="dialog-title-row">
        <div class="icon-circle">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
            <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
          </svg>
        </div>
        <h2 class="dialog-title" id="modalTitle">Delete User</h2>
      </div>
      <p class="dialog-description" id="modalDescription"></p>
    </div>

    <div class="dialog-footer">
      <button class="dm-btn dm-btn-outline" onclick="closeDeleteModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
        Cancel
      </button>
      <button class="dm-btn dm-btn-danger" onclick="confirmDelete()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M10.29 3.86L1.82 18a2 2 0 001.71 3h16.94a2 2 0 001.71-3L13.71 3.86a2 2 0 00-3.42 0z"/>
          <line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/>
        </svg>
        Delete
      </button>
    </div>
  </div>
</div>

<div id="toast"><strong id="t-title"></strong><span id="t-msg"></span></div>

<script>
let users = [
  { id:'USR001', fullname:'John Doe',       username:'johndoe',       email:'johndoe@gmail.com',       phone:'+60 12-345 6789', role:'customer', createdAt:'2024-01-15' },
  { id:'USR002', fullname:'Jane Smith',     username:'janesmith',     email:'janesmith@gmail.com',     phone:'+60 11-234 5678', role:'customer', createdAt:'2024-01-20' },
  { id:'USR003', fullname:'Mike Johnson',   username:'mikejohnson',   email:'mikejohnson@gmail.com',   phone:'+60 14-567 8901', role:'staff',    createdAt:'2024-01-10' },
  { id:'USR004', fullname:'Sarah Williams', username:'sarahwilliams', email:'sarahwilliams@gmail.com', phone:'+60 13-456 7890', role:'customer', createdAt:'2024-02-01' },
  { id:'USR005', fullname:'David Brown',    username:'davidbrown',    email:'davidbrown@gmail.com',    phone:'+60 15-678 9012', role:'customer', createdAt:'2024-02-05' },
  { id:'USR006', fullname:'Mohd Hanafi',    username:'mohdhanafi',    email:'mohdhanafi@gmail.com',    phone:'+60 19-888 9999', role:'owner',    createdAt:'2023-01-12' },
];

const userRole = 'owner';
let filterRole = 'all';
let deletingId  = null;

const cap      = s => s.charAt(0).toUpperCase() + s.slice(1);
const badgeCls = r => ({ customer:'badge-customer', staff:'badge-staff', owner:'badge-owner' }[r] || 'badge-customer');
const canEdit   = u => userRole === 'owner' || (userRole === 'staff' && u.role !== 'owner');
const canDelete = u => u.role !== 'owner';

function getFiltered() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  return users.filter(u => {
    const mq = u.fullname.toLowerCase().includes(q) || u.email.toLowerCase().includes(q) || u.username.toLowerCase().includes(q);
    return mq && (filterRole === 'all' || u.role === filterRole);
  });
}

function renderTable() {
  const list = getFiltered();
  const tb = document.getElementById('tableBody');
  const em = document.getElementById('emptyState');
  if (!list.length) { tb.innerHTML = ''; em.classList.remove('hidden'); return; }
  em.classList.add('hidden');
  tb.innerHTML = list.map(u => `
    <tr>
      <td><div class="user-cell">
        <div class="u-avatar"><svg viewBox="0 0 24 24"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg></div>
        <div><div class="u-name">${u.fullname}</div><div class="u-uname">@${u.username}</div></div>
      </div></td>
      <td><div class="c-email">${u.email}</div><div class="c-phone">${u.phone}</div></td>
      <td><span class="badge ${badgeCls(u.role)}">${cap(u.role)}</span></td>
      <td><span class="joined-date">${new Date(u.createdAt).toLocaleDateString('en-US',{month:'numeric',day:'numeric',year:'numeric'})}</span></td>
      <td><div class="actions">
        <button class="act-btn view" title="View" onclick="window.location.href='viewOwner.html?id=${u.id}'">
          <svg viewBox="0 0 24 24" style="stroke:currentColor"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
        </button>
        ${canEdit(u) ? `<button class="act-btn edit" title="Edit" onclick="window.location.href='editOwner.html?id=${u.id}'">
          <svg viewBox="0 0 24 24" style="stroke:currentColor"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
        </button>` : ''}
        ${canDelete(u) ? `<button class="act-btn del" title="Delete" onclick="openDeleteModal('${u.id}')">
          <svg viewBox="0 0 24 24" style="stroke:currentColor"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6M9 6V4h6v2"/></svg>
        </button>` : ''}
      </div></td>
    </tr>`).join('');
}

function setFilter(btn, role) {
  document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  filterRole = role;
  renderTable();
}

function openDeleteModal(id) {
  const u = users.find(x => x.id === id);
  if (!u) return;
  deletingId = id;
  document.getElementById('modalDescription').textContent =
    `Are you sure you want to delete ${u.fullname} (@${u.username})? This action cannot be undone.`;
  document.getElementById('deleteModal').classList.add('open');
}

function closeDeleteModal() {
  document.getElementById('deleteModal').classList.remove('open');
  deletingId = null;
}

function confirmDelete() {
  users = users.filter(u => u.id !== deletingId);
  closeDeleteModal();
  renderTable();
  showToast('User Deleted', 'The account has been permanently removed.');
}

function showToast(title, msg) {
  document.getElementById('t-title').textContent = title;
  document.getElementById('t-msg').textContent   = msg;
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 4000);
}

// Close on overlay click
document.getElementById('deleteModal').addEventListener('click', function(e) {
  if (e.target === this) closeDeleteModal();
});

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') closeDeleteModal();
});

renderTable();
</script>
</body>
</html>
