<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>View User</title>
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/profilePage.css">
</head>
<body>

<div class="layout">

<!-- VIEW OWNER PAGE -->
<main class="main">

  <div class="back-link" onclick="history.back()">
    <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="19" y1="12" x2="5" y2="12"/>
      <polyline points="12 19 5 12 12 5"/>
    </svg>
    Back
  </div>

  <div class="view-card">

    <!-- TOP PROFILE -->
    <div class="v-hdr">

      <div class="v-avatar">
        <svg viewBox="0 0 24 24">
          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
          <circle cx="12" cy="7" r="4"/>
        </svg>
      </div>

      <div>
        <div class="v-name" id="vv-name">John Doe</div>
        <div class="v-uname" id="vv-uname">@johndoe</div>
        <div class="vrole-pill customer" id="vv-pill">Customer</div>
      </div>

    </div>

    <hr class="v-divider">

    <!-- PERSONAL INFO -->
    <div class="section-title">
      <svg viewBox="0 0 24 24">
        <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
        <circle cx="12" cy="7" r="4"/>
      </svg>
      Personal Information
    </div>

    <div class="info-box">

      <div class="info-grid">

        <div>
          <div class="il">Full Name</div>
          <div class="iv" id="vv-fullname">John Doe</div>
        </div>

        <div>
          <div class="il">Username</div>
          <div class="iv" id="vv-username2">@johndoe</div>
        </div>

        <div>
          <div class="il">Email Address</div>
          <div class="iv" id="vv-email">johndoe@gmail.com</div>
        </div>

        <div>
          <div class="il">Phone Number</div>
          <div class="iv" id="vv-phone">+60 12-345 6789</div>
        </div>

        <div>
          <div class="il">Account Created</div>
          <div class="iv" id="vv-created">15 January 2024</div>
        </div>

      </div>

    </div>

  </div>

</main>

<script>
const users = [
  {
    id:'USR001',
    fullname:'John Doe',
    username:'johndoe',
    email:'johndoe@gmail.com',
    phone:'+60 12-345 6789',
    role:'customer',
    createdAt:'2024-01-15'
  }
];
</script>

</body>
</html>
