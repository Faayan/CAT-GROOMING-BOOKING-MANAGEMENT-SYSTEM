<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meowy Groom - Receipt Management</title>
    <style>
        :root {
    --primary-purple: #5b3273;
    --light-purple: #f8f4fb;
    --sidebar-text: #666;
    --bg-color: #fcfcfc;
    --card-shadow: 0 4px 15px rgba(0,0,0,0.05);
    --border-color: #eee;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
}

body {
    background-color: var(--bg-color);
    color: #333;
}

.container {
    display: flex;
    min-height: 100vh;
}

.logout {
    padding: 25px;
    border-top: 1px solid var(--border-color);
}

.logout a {
    color: #d93025;
    text-decoration: none;
    font-weight: bold;
}

/* Main Content */
.main-content {
    flex-grow: 1;
    padding: 40px;
}

.page-header h1 {
    font-size: 1.8rem;
    color: #222;
}

.page-header p {
    color: #777;
    margin-bottom: 30px;
}

.card {
    background: white;
    border-radius: 15px;
    box-shadow: var(--card-shadow);
    padding: 25px;
    margin-bottom: 25px;
}

/* Stats Grid */
.stats-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    margin-bottom: 30px;
}

.stat-card {
    display: flex;
    align-items: center;
    gap: 20px;
}

.icon-box {
    width: 50px;
    height: 50px;
    border-radius: 10px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 1.2rem;
}

.green-bg { background: #e8f7f0; color: #2ecc71; }
.blue-bg { background: #eef2ff; color: #4a90e2; }
.purple-bg { background: #f5efff; color: #a259ff; }

.stat-info {
    display: flex;
    flex-direction: column-reverse;
}

.stat-value { font-size: 1.6rem; font-weight: 600; }
.stat-label { color: #888; font-size: 0.9rem; }

.text-green { color: #2ecc71; }
.text-blue { color: #4a90e2; }
.text-purple { color: #a259ff; }

/* Search & Filter */
.filter-section h3 { margin-bottom: 5px; }
.filter-section p { color: #888; font-size: 0.9rem; margin-bottom: 20px; }

.filter-controls {
    display: flex;
    gap: 15px;
}

.search-input {
    flex-grow: 1;
    position: relative;
}

.search-input i {
    position: absolute;
    left: 15px;
    top: 50%;
    transform: translateY(-50%);
    color: #aaa;
}

.search-input input {
    width: 100%;
    padding: 12px 12px 12px 45px;
    border: 1px solid #ddd;
    border-radius: 8px;
    outline: none;
}

.filter-dropdown {
    padding: 10px 20px;
    border: 1px solid #ddd;
    border-radius: 8px;
    background: white;
}

/* Receipt Item */
.receipt-item {
    border-bottom: 4px solid transparent;
}

.receipt-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 20px;
}

.receipt-meta {
    display: flex;
    gap: 15px;
    align-items: center;
}

.icon-box.small { width: 40px; height: 40px; }

.receipt-meta h4 { font-size: 1.1rem; }
.receipt-meta p { color: #888; font-size: 0.85rem; }

.view-btn {
    background: #eef2ff;
    border: none;
    color: #4a90e2;
    padding: 8px 12px;
    border-radius: 5px;
    cursor: pointer;
}

.receipt-details {
    display: flex;
    justify-content: space-between;
    padding-top: 15px;
}

.detail-col {
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.detail-col label {
    font-size: 0.85rem;
    color: #999;
}

.detail-col strong {
    font-size: 0.95rem;
}

/* Floating Help Button */
.help-btn {
    position: fixed;
    bottom: 20px;
    right: 20px;
    background: #333;
    color: white;
    width: 40px;
    height: 40px;
    border-radius: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    cursor: pointer;
    font-weight: bold;
}
    </style>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>

    <div class="container">

        <main class="main-content">
            <header class="page-header">
                <h1>Receipt Management</h1>
                <p>View and manage customer payment receipts</p>
            </header>

            <section class="stats-grid">
                <div class="card stat-card">
                    <div class="icon-box green-bg"><i class="fa-solid fa-dollar-sign"></i></div>
                    <div class="stat-info">
                        <span class="stat-value text-green">RM 21.00</span>
                        <span class="stat-label">Total Revenue</span>
                    </div>
                </div>
                
                <div class="card stat-card">
                    <div class="icon-box purple-bg"><i class="fa-solid fa-receipt"></i></div>
                    <div class="stat-info">
                        <span class="stat-value text-purple">1</span>
                        <span class="stat-label">Total Receipts</span>
                    </div>
                </div>
            </section>

            <section class="card filter-section">
                <h3>Receipt Management</h3>
                <p>View and manage customer payment receipts</p>
                <div class="filter-controls">
                    <div class="search-input">
                        <i class="fa-solid fa-magnifying-glass"></i>
                        <input type="text" placeholder="Search by receipt number, customer, or invoice...">
                    </div>
                    <select class="filter-dropdown">
                        <option>All Methods</option>
                    </select>
                </div>
            </section>

            <section class="receipt-list">
                <div class="card receipt-item">
                    <div class="receipt-header">
                        <div class="receipt-meta">
                            <div class="icon-box green-bg small"><i class="fa-solid fa-receipt"></i></div>
                            <div>
                                <h4>RCP-2024-001</h4>
                                <p>Created by Mike Johnson on 1/8/2026</p>
                            </div>
                        </div>
                        <a href="viewReceipt.html"><button class="view-btn"><i class="fa-regular fa-eye"></i></button></a>
                    </div>
                    
                    <div class="receipt-details">
                        <div class="detail-col">
                            <label><i class="fa-regular fa-user"></i> Customer</label>
                            <strong>Ali Ahmad</strong>
                        </div>
                        <div class="detail-col">
                            <label><i class="fa-regular fa-calendar"></i> Payment Date</label>
                            <strong>1/8/2026</strong>
                        </div>
                        <div class="detail-col">
                            <label><i class="fa-regular fa-credit-card"></i> Payment Method</label>
                            <strong>Online Banking</strong>
                        </div>
                        <div class="detail-col">
                            <label><i class="fa-solid fa-dollar-sign"></i> Amount</label>
                            <strong>RM 210.00</strong>
                        </div>
                    </div>
                </div>
            </section>
        </main>
    </div>

    <div class="help-btn">?</div>

</body>
</html>
