<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Edit Grooming Services</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --purple-50:  #f5f3ff;
      --purple-100: #ede9fe;
      --purple-200: #ddd6fe;
      --purple-300: #c4b5fd;
      --purple-600: #7c3aed;
      --purple-700: #6d28d9;
      --purple-800: #5b21b6;
      --green-600:  #16a34a;
      --green-700:  #15803d;
      --amber-50:   #fffbeb;
      --amber-100:  #fef3c7;
      --yellow-50:  #fefce8;
      --gray-50:    #f9fafb;
      --gray-100:   #f3f4f6;
      --gray-200:   #e5e7eb;
      --gray-300:   #d1d5db;
      --gray-500:   #6b7280;
      --gray-600:   #4b5563;
      --gray-700:   #374151;
      --gray-900:   #111827;
      --red-600:    #dc2626;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: #1c1430;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }

    .overlay {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.55);
      backdrop-filter: blur(4px);
      display: flex; align-items: center; justify-content: center;
      padding: 16px; z-index: 50;
    }
    .modal {
      background: #fff;
      border-radius: 20px;
      max-width: 720px; width: 100%;
      max-height: 90vh;
      display: flex; flex-direction: column;
      box-shadow: 0 24px 80px rgba(0,0,0,.4);
      overflow: hidden;
    }

    .modal-header {
      background: linear-gradient(135deg, var(--purple-700), var(--purple-800));
      color: #fff;
      padding: 22px 28px;
      display: flex; justify-content: space-between; align-items: center;
      flex-shrink: 0;
    }
    .modal-title { font-family: 'Playfair Display', serif; font-size: 22px; }
    .btn-x {
      background: none; border: none; cursor: pointer;
      color: #fff; padding: 8px; border-radius: 8px;
      display: flex; transition: background .2s;
    }
    .btn-x:hover { background: rgba(255,255,255,.2); }
    .btn-x svg { width: 22px; height: 22px; }

    .modal-body {
      flex: 1;
      overflow-y: auto;
      background: var(--purple-50);
      padding: 28px;
      scrollbar-width: thin;
      scrollbar-color: var(--purple-300) transparent;
    }
    .modal-body::-webkit-scrollbar { width: 6px; }
    .modal-body::-webkit-scrollbar-thumb { background: var(--purple-300); border-radius: 3px; }

    .modal-footer {
      background: #fff;
      border-top: 2px solid var(--gray-200);
      padding: 18px 28px;
      flex-shrink: 0;
    }
    .btn-done {
      width: 100%;
      padding: 14px;
      background: var(--purple-700);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-family: 'DM Sans', sans-serif;
      font-size: 15px; font-weight: 700;
      cursor: pointer;
      transition: background .2s;
    }
    .btn-done:hover { background: var(--purple-800); }

    .section-head {
      display: flex; justify-content: space-between; align-items: center;
      margin-bottom: 14px;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--gray-900);
    }
    .btn-add-svc {
      padding: 8px 18px;
      background: #fff;
      border: 2px solid var(--gray-200);
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      color: var(--gray-900);
      cursor: pointer;
      display: flex; align-items: center; gap: 6px;
      box-shadow: 0 2px 8px rgba(0,0,0,.08);
      transition: background .15s, box-shadow .15s;
    }
    .btn-add-svc:hover { background: var(--gray-100); box-shadow: 0 4px 14px rgba(0,0,0,.12); }

    .svc-card {
      background: linear-gradient(135deg, var(--amber-50), var(--yellow-50));
      border-radius: 14px;
      padding: 16px;
      box-shadow: 0 2px 10px rgba(0,0,0,.07);
      margin-bottom: 10px;
      transition: box-shadow .2s;
    }
    .svc-card:hover { box-shadow: 0 6px 20px rgba(0,0,0,.12); }
    .svc-inner { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; }
    .svc-info { flex: 1; }
    .svc-name-row { display: flex; align-items: center; gap: 8px; margin-bottom: 4px; }
    .svc-name { font-size: 16px; font-weight: 600; color: var(--gray-900); }
    .weight-badge {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 2px 8px;
      background: var(--purple-100); color: var(--purple-700);
      border-radius: 999px; font-size: 11px; font-weight: 600;
    }
    .svc-desc  { font-size: 13px; color: var(--gray-600); margin-bottom: 8px; }
    .svc-price { font-size: 14px; font-weight: 700; color: var(--purple-700); }
    .weight-tier { font-size: 13px; color: var(--gray-700); margin-bottom: 2px; }
    .weight-tier strong { color: var(--purple-700); }

    .svc-actions { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .btn-edit {
      padding: 8px 16px;
      background: var(--purple-700); color: #fff;
      border: none; border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center; gap: 6px;
      transition: background .15s;
    }
    .btn-edit:hover { background: var(--purple-800); }
    .btn-edit svg { width: 14px; height: 14px; }
    .btn-del {
      background: none; border: none; cursor: pointer;
      padding: 8px; border-radius: 8px; color: var(--gray-700);
      transition: color .15s;
      display: flex;
    }
    .btn-del:hover { color: var(--red-600); }
    .btn-del svg { width: 18px; height: 18px; }

    .form-card {
      background: #fff;
      border: 2px solid var(--purple-300);
      border-radius: 14px;
      padding: 20px;
      margin-bottom: 10px;
    }
    .form-group { margin-bottom: 14px; }
    .form-label {
      display: block;
      font-size: 13px; font-weight: 600;
      color: var(--gray-700);
      margin-bottom: 6px;
    }
    input[type="text"],
    input[type="number"],
    textarea,
    select {
      width: 100%;
      padding: 10px 14px;
      border: 2px solid var(--gray-300);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--gray-900);
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--purple-600);
      box-shadow: 0 0 0 3px rgba(124,58,237,.15);
    }
    textarea { resize: none; }

    .weight-pricing-box {
      background: var(--purple-50);
      border: 1px solid var(--purple-200);
      border-radius: 10px;
      padding: 14px;
    }
    .tier-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .tier-row:last-child { margin-bottom: 0; }
    .tier-label {
      flex: 1;
      padding: 8px 12px;
      background: #fff;
      border: 1px solid var(--gray-300);
      border-radius: 7px;
      font-size: 13px; color: var(--gray-700);
    }
    .tier-input { width: 120px; }

    .checkbox-wrap {
      background: var(--purple-50);
      border: 1px solid var(--purple-200);
      border-radius: 9px;
      padding: 12px 14px;
      display: flex; align-items: center; gap: 8px;
      cursor: pointer;
    }
    .checkbox-wrap input[type="checkbox"] {
      width: 16px; height: 16px;
      accent-color: var(--purple-700);
      cursor: pointer;
    }
    .checkbox-wrap label { font-size: 13px; color: var(--gray-700); cursor: pointer; }

    .form-actions { display: flex; gap: 10px; margin-top: 16px; }
    .btn-save {
      padding: 10px 22px;
      background: var(--green-600); color: #fff;
      border: none; border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-save:hover { background: var(--green-700); }
    .btn-cancel-sm {
      padding: 10px 20px;
      background: #fff; color: var(--gray-700);
      border: 2px solid var(--gray-300);
      border-radius: 9px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px; font-weight: 600;
      cursor: pointer; transition: background .15s;
    }
    .btn-cancel-sm:hover { background: var(--gray-100); }

    .section-divider { border: none; border-top: 2px solid var(--purple-200); margin: 26px 0; }
    .add-form-wrap { margin-bottom: 20px; }
  </style>
</head>
<body>

<div class="overlay">
  <div class="modal" id="modal">

    <div class="modal-header">
      <span class="modal-title">Edit Grooming Services</span>
      <button class="btn-x" onclick="closeModal()">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
      </button>
    </div>

    <div class="modal-body" id="modalBody">

      <!-- Add Form (hidden initially) -->
      <div class="add-form-wrap" id="addFormWrap" style="display:none">
        <div class="form-card">
          <div style="font-size:16px;font-weight:700;color:var(--gray-900);margin-bottom:14px">Add New Service</div>
          <div class="form-group">
            <label class="form-label">Service Name</label>
            <input type="text" id="newName" placeholder="Enter service name" />
          </div>
          <div class="form-group">
            <label class="form-label">Description</label>
            <textarea id="newDesc" rows="2" placeholder="Enter service description"></textarea>
          </div>
          <div class="form-group">
            <label class="form-label">Category</label>
            <select id="newCategory">
              <option value="Main Packages">Main Packages</option>
              <option value="Add-On Services (Optional)">Add-On Services (Optional)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label">Price (RM)</label>
            <input type="number" id="newPrice" placeholder="0.00" min="0" step="0.01" value="0" />
          </div>
          <div class="form-group checkbox-wrap" onclick="document.getElementById('newIsAdult').click()">
            <input type="checkbox" id="newIsAdult" onclick="event.stopPropagation()" />
            <label for="newIsAdult">Weight-based pricing</label>
          </div>
          <div class="form-actions">
            <button class="btn-save" onclick="handleAddService()">Add Service</button>
            <button class="btn-cancel-sm" onclick="closeAddForm()">Cancel</button>
          </div>
        </div>
      </div>

      <!-- Main Packages -->
      <div class="section-head">
        <span class="section-title">Main Packages</span>
        <button class="btn-add-svc" onclick="openAddForm()">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add Grooming Service
        </button>
      </div>
      <div id="mainList"></div>

      <hr class="section-divider" />

      <!-- Add-On Services -->
      <div class="section-head">
        <span class="section-title">Add-On Services (Optional)</span>
      </div>
      <div id="addonList"></div>

    </div>

    <div class="modal-footer">
      <button class="btn-done" onclick="window.location.href='appointmentManagement.html'">Done</button>
    </div>

  </div>
</div>

<script>
  // ── Data ──────────────────────────────────────────────────────────────────
  let services = [
    {
      id: 'kitten',
      name: 'Kitten Package',
      category: 'Main Packages',
      description: 'Gentle grooming designed for kittens under 4 months old.',
      price: 35,
      isAdultPackage: true,
      weightPricing: [
        { min: 0,   max: 1.5,  price: 35, label: 'Below 1.5 kg' },
        { min: 1.6, max: 2.5,  price: 40, label: '1.6 kg – 2.5 kg' }
      ]
    },
    {
      id: 'short-hair',
      name: 'Short-hair Package',
      category: 'Main Packages',
      description: 'Bath & dry, nail clipping, eye & ear cleaning. Great for short-haired cats.',
      price: 55,
      isAdultPackage: false
    },
    {
      id: 'long-hair',
      name: 'Long-hair Package',
      category: 'Main Packages',
      description: 'Bath & dry, nail clipping, eye & ear cleaning. Great for long-haired cats.',
      price: 60,
      isAdultPackage: false
    },
    {
      id: 'lion-cut',
      name: 'Lion Cut',
      category: 'Main Packages',
      description: 'Full body shave leaving a mane around the head and fluffy tail tip.',
      price: 120,
      isAdultPackage: false
    },
    {
      id: 'medicated-shampoo',
      name: 'Medicated Shampoo',
      category: 'Add-On Services (Optional)',
      description: 'Hypoallergenic or medicated shampoo for sensitive or problem skin.',
      price: 10,
      isAdultPackage: false
    },
    {
      id: 'trimming',
      name: 'Trimming - Paw & Sanitary Area',
      category: 'Add-On Services (Optional)',
      description: 'Trimming the paw and sanitary area of a cat helps maintain cleanliness, and improves comfort and hygiene.',
      price: 20,
      isAdultPackage: false
    },
    {
      id: 'flea-removal',
      name: 'Flea Removal',
      category: 'Add-On Services (Optional)',
      description: 'Topical flea and tick treatment applied during the bath.',
      price: 20,
      isAdultPackage: false
    }
  ];

  let editingId  = null;
  let editBuffer = {};

  // ── Helpers ───────────────────────────────────────────────────────────────
  function weightLabel(tier) {
    if (tier.label) return tier.label;
    return tier.max === null ? `${tier.min} kg and above` : `${tier.min} kg – ${tier.max} kg`;
  }

  function renderAll() {
    renderSection('mainList',  'Main Packages');
    renderSection('addonList', 'Add-On Services (Optional)');
  }

  function renderSection(containerId, category) {
    const el = document.getElementById(containerId);
    el.innerHTML = '';
    services.filter(s => s.category === category).forEach(svc => {
      el.appendChild(editingId === svc.id ? buildEditCard(svc) : buildViewCard(svc));
    });
  }

  // ── View Card ─────────────────────────────────────────────────────────────
  function buildViewCard(svc) {
    const div = document.createElement('div');
    div.className = 'svc-card';

    let pricingHTML = '';
    if (svc.isAdultPackage && svc.weightPricing) {
      pricingHTML = svc.weightPricing.map(t =>
        `<div class="weight-tier"><strong>${weightLabel(t)}:</strong> RM ${t.price.toFixed(2)}</div>`
      ).join('');
    } else {
      pricingHTML = `<div class="svc-price">RM ${svc.price.toFixed(2)}</div>`;
    }

    div.innerHTML = `
      <div class="svc-inner">
        <div class="svc-info">
          <div class="svc-name-row">
            <span class="svc-name">${svc.name}</span>
            ${svc.isAdultPackage ? `<span class="weight-badge">⚖️ Weight-based</span>` : ''}
          </div>
          <p class="svc-desc">${svc.description}</p>
          ${pricingHTML}
        </div>
        <div class="svc-actions">
          <button class="btn-edit" onclick="startEdit('${svc.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
            Edit
          </button>
          <button class="btn-del" onclick="handleDelete('${svc.id}')">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
          </button>
        </div>
      </div>`;
    return div;
  }

  // ── Edit Card ─────────────────────────────────────────────────────────────
  function buildEditCard(svc) {
    const div = document.createElement('div');
    div.className = 'form-card';

    let pricingSection = '';
    if (editBuffer.isAdultPackage && editBuffer.weightPricing) {
      pricingSection = `
        <div class="form-group">
          <label class="form-label">⚖️ Weight-Based Pricing</label>
          <div class="weight-pricing-box">
            ${editBuffer.weightPricing.map((t, i) => `
              <div class="tier-row">
                <div class="tier-label">${weightLabel(t)}</div>
                <input type="number" class="tier-input" value="${t.price}" min="0" step="0.01"
                  onchange="updateTierPrice(${i}, parseFloat(this.value)||0)" />
              </div>`).join('')}
          </div>
        </div>`;
    } else {
      pricingSection = `
        <div class="form-group">
          <label class="form-label">Price (RM)</label>
          <input type="number" value="${editBuffer.price}" min="0" step="0.01"
            onchange="editBuffer.price = parseFloat(this.value)||0" />
        </div>`;
    }

    div.innerHTML = `
      <div class="form-group">
        <label class="form-label">Service Name</label>
        <input type="text" value="${escapeHtml(editBuffer.name)}" oninput="editBuffer.name=this.value" />
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea rows="2" oninput="editBuffer.description=this.value">${escapeHtml(editBuffer.description)}</textarea>
      </div>
      ${pricingSection}
      <div class="form-actions">
        <button class="btn-save"      onclick="saveEdit()">Save</button>
        <button class="btn-cancel-sm" onclick="cancelEdit()">Cancel</button>
      </div>`;
    return div;
  }

  function escapeHtml(str) {
    return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  // ── Edit Actions ──────────────────────────────────────────────────────────
  function startEdit(id) {
    const svc = services.find(s => s.id === id);
    editBuffer = JSON.parse(JSON.stringify(svc));
    editingId  = id;
    renderAll();
  }

  function cancelEdit() { editingId = null; editBuffer = {}; renderAll(); }

  function saveEdit() {
    services  = services.map(s => s.id === editingId ? { ...s, ...editBuffer } : s);
    editingId = null; editBuffer = {};
    renderAll();
  }

  function updateTierPrice(index, price) {
    if (editBuffer.weightPricing) editBuffer.weightPricing[index].price = price;
  }

  // ── Delete ────────────────────────────────────────────────────────────────
  function handleDelete(id) {
    if (confirm('Are you sure you want to delete this service?')) {
      services = services.filter(s => s.id !== id);
      if (editingId === id) { editingId = null; editBuffer = {}; }
      renderAll();
    }
  }

  // ── Add Form ──────────────────────────────────────────────────────────────
  function openAddForm() {
    document.getElementById('addFormWrap').style.display = 'block';
    document.getElementById('newName').value    = '';
    document.getElementById('newDesc').value    = '';
    document.getElementById('newPrice').value   = '0';
    document.getElementById('newIsAdult').checked = false;
    document.getElementById('newCategory').value  = 'Main Packages';
    document.getElementById('newName').focus();
  }

  function closeAddForm() {
    document.getElementById('addFormWrap').style.display = 'none';
  }

  function handleAddService() {
    const name  = document.getElementById('newName').value.trim();
    const desc  = document.getElementById('newDesc').value.trim();
    const price = parseFloat(document.getElementById('newPrice').value) || 0;
    const cat   = document.getElementById('newCategory').value;
    const adult = document.getElementById('newIsAdult').checked;

    if (!name || !desc || price <= 0) {
      alert('Please fill in all fields and enter a valid price.'); return;
    }

    const newSvc = {
      id: Date.now().toString(),
      name, description: desc, category: cat, price, isAdultPackage: adult,
      weightPricing: adult ? [
        { min: 0, max: 3,    price,          label: 'Below 3 kg' },
        { min: 3, max: 5,    price: price+10, label: '3 kg – 5 kg' },
        { min: 5, max: null, price: price+20, label: '5 kg and above' }
      ] : undefined
    };

    services.push(newSvc);
    closeAddForm();
    renderAll();
  }

  // ── Modal Close ───────────────────────────────────────────────────────────
  function closeModal() {
    window.location.href = 'appointmentManagement.html';
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  renderAll();
</script>
</body>
</html>
